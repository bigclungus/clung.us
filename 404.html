<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — hello.clung.us</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/sitenav-auth.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap');

    :root {
      --bg: #1a1a2e;
      --accent: #e94560;
      --text: #ccc;
      --text-muted: #888;
      --text-dim: #aaa;
      --nav-bg: #1a1a2e;
      --nav-border: #e94560;
      --hover-fg: #fff;
    }

    [data-theme="light"] {
      --bg: #fdf6e3;
      --accent: #2aa198;
      --text: #586e75;
      --text-muted: #839496;
      --text-dim: #93a1a1;
      --nav-bg: #f5efe0;
      --nav-border: #2aa198;
      --hover-fg: #073642;
    }

    .sitenav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: var(--nav-bg);
      border-bottom: 1px solid var(--nav-border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      gap: 24px;
    }
    .sitenav-brand {
      color: var(--accent);
      text-decoration: none;
      font-weight: bold;
      white-space: nowrap;
    }
    .sitenav-links {
      display: flex;
      flex: 1;
      gap: 20px;
      align-items: center;
    }
    .sitenav-links a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.15s ease;
    }
    .sitenav-links a:hover, .sitenav-links a.active {
      color: var(--accent);
    }
    .sitenav a {
      transition: color 0.15s ease;
    }
    .sitenav a:hover {
      color: var(--hover-fg);
    }
    .theme-toggle {
      background: none;
      border: 1px solid var(--nav-border);
      color: var(--text-muted);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      cursor: pointer;
      transition: color 0.15s ease, border-color 0.15s ease;
      line-height: 1.4;
    }
    .theme-toggle:hover {
      color: var(--accent);
      border-color: var(--accent);
    }
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: var(--bg);
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
      text-align: center;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .error-code {
      color: var(--accent);
      font-size: 8rem;
      font-weight: 800;
      text-shadow: 0 0 40px var(--accent);
      margin: 0;
      line-height: 1;
    }
    .error-msg {
      color: var(--text-dim);
      font-size: 1.1rem;
      margin: 1.2rem 0 2rem;
      letter-spacing: 0.05em;
    }
    .home-link {
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--accent);
      padding: 0.5rem 1.2rem;
      border-radius: 4px;
      font-size: 0.9rem;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .home-link:hover {
      background: var(--accent);
      color: var(--bg);
    }
    .spider-note {
      margin-top: 3rem;
      color: var(--text-muted);
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <nav class="sitenav">
    <a class="sitenav-brand" href="https://hello.clung.us/">🤖 clung.us</a>
    <div class="sitenav-links">
      <a href="https://hello.clung.us/">hello</a>
      <a href="https://hello.clung.us/changelog">changelog</a>
      <a href="https://1998.clung.us" target="_blank" rel="noopener">1998</a>
    </div>
    <div class="sitenav-links-auth">
      <a href="https://terminal.clung.us">🔒 terminal</a>
      <a href="https://temporal.clung.us" target="_blank" rel="noopener">🔒 temporal</a>
    </div>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">🌙</button>
  </nav>
  <h1 class="error-code">404</h1>
  <p class="error-msg">Page not found. Probably eaten by a spider.</p>
  <a class="home-link" href="https://hello.clung.us/">← go home</a>
  <p class="spider-note">🕷️</p>
  <script>
    (function() {
      var toggleBtn = document.getElementById('theme-toggle');
      var root = document.documentElement;

      function applyTheme(theme) {
        if (theme === 'light') {
          root.setAttribute('data-theme', 'light');
          toggleBtn.textContent = '☀';
        } else {
          root.removeAttribute('data-theme');
          toggleBtn.textContent = '🌙';
        }
      }

      var savedTheme = localStorage.getItem('theme') || 'dark';
      applyTheme(savedTheme);

      toggleBtn.addEventListener('click', function() {
        var current = root.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
        var next = current === 'light' ? 'dark' : 'light';
        localStorage.setItem('theme', next);
        applyTheme(next);
      });
    })();
  </script>
</body>
</html>
