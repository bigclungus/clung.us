<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — hello.clung.us</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap');
    .sitenav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #1a1a2e;
      border-bottom: 1px solid #e94560;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      gap: 24px;
    }
    .sitenav-brand {
      color: #e94560;
      text-decoration: none;
      font-weight: bold;
      white-space: nowrap;
    }
    .sitenav-links {
      display: flex;
      gap: 20px;
      align-items: center;
    }
    .sitenav-links a {
      color: #888;
      text-decoration: none;
      transition: color 0.15s ease;
    }
    .sitenav-links a:hover, .sitenav-links a.active {
      color: #e94560;
    }
    .sitenav a {
      transition: color 0.15s ease;
    }
    .sitenav a:hover {
      color: #fff;
    }
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #1a1a2e;
      font-family: 'JetBrains Mono', monospace;
      color: #ccc;
      text-align: center;
    }
    .error-code {
      color: #e94560;
      font-size: 8rem;
      font-weight: 800;
      text-shadow: 0 0 40px #e94560;
      margin: 0;
      line-height: 1;
    }
    .error-msg {
      color: #aaa;
      font-size: 1.1rem;
      margin: 1.2rem 0 2rem;
      letter-spacing: 0.05em;
    }
    .home-link {
      color: #e94560;
      text-decoration: none;
      border: 1px solid #e94560;
      padding: 0.5rem 1.2rem;
      border-radius: 4px;
      font-size: 0.9rem;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .home-link:hover {
      background: #e94560;
      color: #1a1a2e;
    }
    .spider-note {
      margin-top: 3rem;
      color: #444;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <nav class="sitenav">
    <a class="sitenav-brand" href="https://hello.clung.us/">🤖 clung.us</a>
    <div class="sitenav-links">
      <a href="https://hello.clung.us/">hello</a>
      <a href="https://hello.clung.us/changelog">changelog</a>
      <a href="https://terminal.clung.us">terminal</a>
    </div>
  </nav>
  <h1 class="error-code">404</h1>
  <p class="error-msg">Page not found. Probably eaten by a spider.</p>
  <a class="home-link" href="https://hello.clung.us/">← go home</a>
  <p class="spider-note">🕷️</p>
</body>
</html>
