<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Commons — clung.us</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/sitenav.css?v=b6d00bc">
  <script src="/sitenav.js?v=b6d00bc" defer></script>
  <style>
    body {
      margin: 0;
      background: var(--bg, #0d0d1a);
      color: var(--text, #e0e0ff);
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .commons-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 12px 32px;
      flex: 1;
    }
    .commons-title {
      font-size: 22px;
      letter-spacing: 0.15em;
      color: #4ecca3;
      margin: 10px 0 6px;
      text-transform: uppercase;
      font-weight: 700;
      text-shadow: 0 0 12px #4ecca388;
    }
    .commons-sub {
      font-size: 11px;
      color: #555570;
      margin: 0 0 12px;
      letter-spacing: 0.08em;
    }
    canvas {
      display: block;
      border: 2px solid #2a2a40;
      border-radius: 4px;
      image-rendering: pixelated;
      cursor: default;
      max-width: 100%;
    }
    .tooltip {
      position: fixed;
      background: #11111f;
      border: 1px solid #4ecca3;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 11px;
      color: #e0e0ff;
      pointer-events: none;
      display: none;
      z-index: 100;
      max-width: 180px;
    }
    .tooltip .tt-name { color: #4ecca3; font-weight: 700; margin-bottom: 3px; }
    .tooltip .tt-role { color: #888898; font-size: 10px; }
    .tooltip img { display: block; width: 32px; height: 32px; margin-bottom: 5px; image-rendering: pixelated; border-radius: 2px; }
    #load-error {
      color: #e94560;
      font-size: 12px;
      margin-top: 10px;
    }
    /* ── Invoke overlay ──────────────────────────────────────────────── */
    #invoke-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.55);
      align-items: center;
      justify-content: center;
    }
    #invoke-overlay.active { display: flex; }
    #invoke-box {
      background: #0d0d1a;
      border: 1px solid #4ecca3;
      border-radius: 6px;
      padding: 18px 20px 16px;
      width: 340px;
      max-width: 92vw;
      box-shadow: 0 0 24px #4ecca344;
    }
    #invoke-title {
      color: #4ecca3;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }
    #invoke-input {
      width: 100%;
      box-sizing: border-box;
      background: #11111f;
      border: 1px solid #2a2a40;
      border-radius: 4px;
      color: #e0e0ff;
      font-family: inherit;
      font-size: 12px;
      padding: 7px 9px;
      outline: none;
      resize: none;
    }
    #invoke-input:focus { border-color: #4ecca3; }
    #invoke-hint {
      color: #444460;
      font-size: 10px;
      margin-top: 6px;
    }
    #invoke-cancel {
      background: none;
      border: none;
      color: #555570;
      font-family: inherit;
      font-size: 10px;
      cursor: pointer;
      margin-top: 8px;
      padding: 0;
    }
    #invoke-cancel:hover { color: #e94560; }
    #music-btn {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: #11111f;
      border: 1px solid #2a2a40;
      border-radius: 4px;
      color: #e0e0ff;
      font-size: 18px;
      padding: 6px 10px;
      cursor: pointer;
      z-index: 50;
      font-family: monospace;
    }
    #music-btn:hover { border-color: #4ecca3; }
  </style>
</head>
<body>
  <div class="commons-wrap">
    <div class="commons-title">The Commons</div>
    <div class="commons-sub">where the council grazes</div>
    <canvas id="map" width="800" height="560"></canvas>
    <div id="load-error"></div>
  </div>
  <div class="tooltip" id="tooltip">
    <img id="tt-avatar" src="" alt="">
    <div class="tt-name" id="tt-name"></div>
    <div class="tt-role" id="tt-role"></div>
  </div>

  <!-- Click-to-invoke overlay -->
  <div id="invoke-overlay">
    <div id="invoke-box">
      <div id="invoke-title">speak to <span id="invoke-persona-label"></span></div>
      <textarea id="invoke-input" rows="3" placeholder="ask something..."></textarea>
      <div id="invoke-hint">Enter to send · Shift+Enter for newline</div>
      <button id="invoke-cancel">cancel</button>
    </div>
  </div>

  <!-- Hidden YouTube player -->
  <div id="yt-player-wrap" style="position:fixed;left:-1px;top:-1px;width:0;height:0;overflow:hidden;pointer-events:none;">
    <div id="yt-player"></div>
  </div>

  <!-- Music toggle button -->
  <button id="music-btn" title="Toggle ambient music">🔇</button>

<script>
(function () {
'use strict';

// ── Constants ──────────────────────────────────────────────────────────────────
var W = 800, H = 560;
var TILE = 16;
var COLS = Math.floor(W / TILE); // 50
var ROWS = Math.floor(H / TILE); // 35

// ── Persona quips ──────────────────────────────────────────────────────────────
var QUIPS = {
  'chairman': ["Order.", "The gavel is patient.", "...", "Retained.", "The record stands.", "Deliberate."],
  'critic':     ["That's wrong.", "Prove it works.", "No.", "Show your data.", "Unacceptable.", "Rejected."],
  'architect':  ["Consider the load.", "What scales here?", "Draw the diagram.", "Single source.", "Decouple this.", "The foundation matters."],
  'ux':         ["Is this usable?", "Who's the user?", "Friction is failure.", "Test with humans.", "Accessibility first.", "Can my gran do it?"],
  'wolf':       ["*awoo*", "rewrite it in Rust", "*grr*", "FASTER", "*howls*", "Ship. Now."],
  'galactus':   ["I HUNGER.", "YOUR SYSTEMS WILL FEED ME.", "INCONSEQUENTIAL.", "I HAVE SEEN BILLIONS OF STACKS.", "MORTAL CODE.", "FEED ME YOUR DATA."],
  'designer':   ["Aesthetically, no.", "More contrast.", "Wrong font.", "The kerning is off.", "Iterate the palette.", "Beauty is function."],
  'the-kid':    ["FAST", "GO GO GO", "*zooms*", "CAN'T STOP", "SPEEEEED", "AAAA"],
  'uncle-bob':  ["Clean this up.", "SOLID.", "One responsibility.", "Extract that method.", "No comments needed.", "Meaningful names."],
  'adelbert':   ["I know what you did.", "Classic Yuki move.", "Interesting choice.", "I remember.", "Some of us are watching.", "As expected."],
  'spengler':   ["Doomed.", "We had a good run.", "The entropy is winning.", "I called it.", "Everything decays.", "*sighs*"],
  'otto':       ["Chaos is order.", "I see patterns.", "Everything connects.", "The vortex knows.", "Cycles within cycles.", "Observe the flow."],
  'hume':       ["Where's the evidence?", "Show me the data.", "That's speculation.", "Observation first.", "Prove it empirically.", "I reject the a priori."],
  'bloodfeast': ["OVERWHELMING FORCE.", "Half measures lose wars.", "Commit or go home.", "I've seen weak plans fail.", "No phased rollout. Deploy.", "The Soviets wouldn't phase."],
  'pm':         ["Does this move the needle?", "Cut scope.", "Ship something.", "What's the outcome?", "That's not a requirement.", "Validate it first."],
  'trump':      ["Tremendous.", "Nobody does it better.", "Big. Very big.", "I win. That's what I do.", "They said it couldn't be done.", "Believe me."],
  'morgan':     ["I need to sit with that.", "That's a lot to unpack.", "I'm not sure I have bandwidth.", "That lands differently for me.", "We should hold space here.", "I felt that."],
  'jhaddu':     ["As we learned at SVITEMS...", "Simply apply the Factory pattern.", "One more layer of abstraction.", "This is very simple, actually.", "The Enterprise Approach is...", "AbstractRepositoryManagerFactory."],
};

// Fallback quips for unknown personas
var DEFAULT_QUIPS = ["...", "hmm.", "processing.", "interesting.", "noted.", "ok."];

// Per-persona color overrides (fallback to API color)
var COLOR_OVERRIDES = {
  'chairman':  '#8B1A1A',
  'critic':    '#f87171',
  'architect': '#f59e0b',
  'ux':        '#60a5fa',
  'wolf':      '#f97316',
  'galactus':  '#6366f1',
  'designer':  '#ec4899',
  'the-kid':   '#facc15',
  'uncle-bob': '#34d399',
  'adelbert':  '#94a3b8',
  'spengler':  '#94a3b8',
  'otto':      '#a78bfa',
  'hume':      '#38bdf8',
  'bloodfeast':'#dc2626',
  'pm':        '#84cc16',
  'trump':     '#eab308',
  'morgan':    '#d946ef',
  'jhaddu':    '#fb923c',
};

// ── Season system (Feature 4) ─────────────────────────────────────────────────
// Week-of-year mod 4 = 0=spring, 1=summer, 2=autumn, 3=winter
function getSeason() {
  var now = new Date();
  var start = new Date(now.getFullYear(), 0, 1);
  var weekOfYear = Math.floor((now - start) / (7 * 24 * 3600 * 1000));
  return weekOfYear % 4; // 0=spring,1=summer,2=autumn,3=winter
}
var SEASON = getSeason();
var SEASON_LABELS = ['🌸 spring', '☀️ summer', '🍂 autumn', '❄️ winter'];

// ── Congress live state ────────────────────────────────────────────────────────
var congressState = { active: false, topic: '', debaters: [] };

function pollCongress() {
  fetch('/api/congress/active')
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(d) { if (d) congressState = d; })
    .catch(function() {});
}
pollCongress();
setInterval(pollCongress, 10000);

// Council area: top-left building (rows 2-6, cols 2-8) — pixel centers
var COUNCIL_TILES = [];
(function() {
  for (var r = 2; r <= 6; r++) {
    for (var c = 2; c <= 8; c++) {
      COUNCIL_TILES.push({ tx: c, ty: r });
    }
  }
})();

// ── Time of day overlay ────────────────────────────────────────────────────────
function getTimeOverlay() {
  var h = new Date().getHours() + new Date().getMinutes() / 60;
  if (h >= 6 && h < 18) return null; // daytime — no tint
  if (h >= 18 && h < 21) return { r: 255, g: 140, b: 0, a: 0.15, stars: false };
  if (h >= 21 && h < 24) return { r: 30, g: 0, b: 80, a: 0.25, stars: false };
  // 00:00-06:00
  return { r: 0, g: 0, b: 40, a: 0.40, stars: true };
}

// Pre-generate star positions (seeded deterministically)
var STAR_POS = [];
(function() {
  for (var i = 0; i < 60; i++) {
    // pseudo-random but deterministic
    var x = ((i * 137 + 23) * 79) % W;
    var y = ((i * 53 + 11) * 41) % (H * 0.6); // top 60% of canvas
    STAR_POS.push({ x: x, y: y });
  }
})();

// ── Map definition ──────────────────────────────────────────────────────────────
// 0=grass, 1=path (dirt), 2=water(pond), 3=wall/building, 4=tree, 5=rock
var MAP = (function () {
  var m = [];
  for (var r = 0; r < ROWS; r++) {
    m.push(new Uint8Array(COLS));
  }

  // Grass is default (0). Let's carve out paths, pond, buildings.

  // Horizontal path across middle
  for (var c = 0; c < COLS; c++) { m[17][c] = 1; m[18][c] = 1; }
  // Vertical path down center
  for (var r = 0; r < ROWS; r++) { m[r][24] = 1; m[r][25] = 1; }

  // Pond bottom-left area  (rows 22-27, cols 4-10)
  for (var r = 22; r <= 27; r++)
    for (var c = 4; c <= 10; c++)
      m[r][c] = 2;

  // Building top-left (rows 2-6, cols 2-8)
  for (var r = 2; r <= 6; r++)
    for (var c = 2; c <= 8; c++)
      m[r][c] = 3;

  // Building top-right (rows 2-6, cols 40-47)
  for (var r = 2; r <= 6; r++)
    for (var c = 40; c <= 47; c++)
      m[r][c] = 3;

  // Building bottom-right (rows 26-31, cols 38-46)
  for (var r = 26; r <= 31; r++)
    for (var c = 38; c <= 46; c++)
      m[r][c] = 3;

  // Trees scattered
  var trees = [
    [1,1],[1,12],[1,35],[1,48],
    [8,3],[8,14],[8,38],[8,47],
    [10,10],[10,30],[10,45],
    [14,2],[14,20],[14,44],
    [20,5],[20,15],[20,35],[20,48],
    [22,18],[22,40],
    [28,3],[28,20],[28,47],
    [32,8],[32,30],[32,46],
    [33,1],[33,48],
    [34,14],[34,35],
  ];
  trees.forEach(function(t) { if (t[0] < ROWS && t[1] < COLS) m[t[0]][t[1]] = 4; });

  // Rocks
  var rocks = [
    [9,22],[11,40],[15,12],[16,32],[21,27],[25,14],[29,35],[31,12],[33,40],
  ];
  rocks.forEach(function(t) { if (t[0] < ROWS && t[1] < COLS) m[t[0]][t[1]] = 5; });

  return m;
})();

function isBlocked(tx, ty) {
  if (tx < 0 || tx >= COLS || ty < 0 || ty >= ROWS) return true;
  // Allow entering congress building through doorway
  if (tx === 5 && ty === 5) return false; // doorway
  if (tx === 5 && ty === 6) return false; // steps
  var t = MAP[ty][tx];
  return t === 2 || t === 3 || t === 4 || t === 5;
}

// ── Canvas & context ───────────────────────────────────────────────────────────
var canvas = document.getElementById('map');
var ctx = canvas.getContext('2d');

// ── Rendering: draw map ────────────────────────────────────────────────────────
// Grass color variants (seeded by position for variety, season-aware)
function grassColor(tx, ty) {
  var h = (tx * 7 + ty * 13 + tx * ty) % 16;
  if (SEASON === 1) { // summer — brighter
    if (h < 4) return '#1f501f';
    if (h < 8) return '#235223';
    if (h < 12) return '#244d24';
    return '#1f4a1f';
  }
  if (SEASON === 2) { // autumn — brown-tinged
    if (h < 4) return '#3a2c14';
    if (h < 8) return '#3d2e18';
    if (h < 12) return '#3a3018';
    return '#382c14';
  }
  if (SEASON === 3) { // winter — dark snow-gray
    if (h < 4) return '#28283a';
    if (h < 8) return '#2c2c3e';
    if (h < 12) return '#2a2a3c';
    return '#2a2a3a';
  }
  // spring (default)
  if (h < 4) return '#1a3a1a';
  if (h < 8) return '#1d421d';
  if (h < 12) return '#1f3d1f';
  return '#1c381c';
}

function drawMap() {
  for (var ty = 0; ty < ROWS; ty++) {
    for (var tx = 0; tx < COLS; tx++) {
      var t = MAP[ty][tx];
      var x = tx * TILE, y = ty * TILE;
      switch (t) {
        case 0: // grass
          ctx.fillStyle = grassColor(tx, ty);
          ctx.fillRect(x, y, TILE, TILE);
          // occasional darker grass blade
          if ((tx * 3 + ty * 5) % 7 === 0) {
            ctx.fillStyle = '#14281480';
            ctx.fillRect(x + 2, y + 6, 2, 6);
          }
          // Seasonal decorations
          if (SEASON === 0 && (tx * 11 + ty * 17) % 50 === 0) {
            // Spring: white flower pixels (2% chance per tile)
            ctx.fillStyle = '#ffffffcc';
            ctx.fillRect(x + 6, y + 5, 2, 2);
            ctx.fillStyle = '#ffccddcc';
            ctx.fillRect(x + 5, y + 6, 4, 1);
          } else if (SEASON === 1 && (tx * 13 + ty * 19) % 50 === 0) {
            // Summer: yellow wildflowers
            ctx.fillStyle = '#f0e030cc';
            ctx.fillRect(x + 6, y + 4, 2, 2);
            ctx.fillStyle = '#f0e030aa';
            ctx.fillRect(x + 5, y + 5, 4, 1);
          } else if (SEASON === 2 && (tx * 7 + ty * 11) % 30 === 0) {
            // Autumn: fallen leaf pixels
            ctx.fillStyle = '#c06820aa';
            ctx.fillRect(x + ((tx * 5) % 8) + 2, y + ((ty * 7) % 8) + 2, 3, 2);
          }
          break;
        case 1: // path/dirt
          ctx.fillStyle = (tx + ty) % 2 === 0 ? '#5a4020' : '#503a1c';
          ctx.fillRect(x, y, TILE, TILE);
          break;
        case 2: // water
          ctx.fillStyle = (tx + ty) % 2 === 0 ? '#1a3a6a' : '#1e4278';
          ctx.fillRect(x, y, TILE, TILE);
          // shimmer highlight
          if ((tx + ty * 2) % 3 === 0) {
            ctx.fillStyle = '#3a6ab880';
            ctx.fillRect(x + 3, y + 2, 4, 2);
          }
          break;
        case 3: // building
          if (ty >= 2 && ty <= 6 && tx >= 2 && tx <= 8) {
            // ── Classical Pillars — Council Building (Variant A winner) ──────
            // Base: stone gray wall
            ctx.fillStyle = '#2a2050';
            ctx.fillRect(x, y, TILE, TILE);
            ctx.fillStyle = '#3a3068';
            ctx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);

            if (ty === 2) {
              // Pediment row: triangular peak effect
              var distFromCenter = Math.abs(tx - 5);
              var peakColor = distFromCenter <= 1 ? '#8a8aaa' : distFromCenter <= 2 ? '#6a6a8a' : '#4a4a6a';
              ctx.fillStyle = peakColor;
              ctx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);
              // Pediment triangle: fill top portion proportionally to distance
              var triH = Math.max(0, (3 - distFromCenter) * 4);
              if (triH > 0) {
                ctx.fillStyle = '#9a9abb';
                ctx.fillRect(x + 2, y + 1, TILE - 4, triH);
              }
            } else if (ty === 6) {
              // Steps row: 3-tier lighter stone at bottom
              ctx.fillStyle = '#4a4080';
              ctx.fillRect(x, y + 10, TILE, 6);
              ctx.fillStyle = '#5a5090';
              ctx.fillRect(x, y + 12, TILE, 4);
              ctx.fillStyle = '#6a60a0';
              ctx.fillRect(x, y + 14, TILE, TILE - 14);
            }

            // Columns: at tx 2, 4, 6, 8 draw vertical column strips
            if (tx === 2 || tx === 4 || tx === 6 || tx === 8) {
              if (ty > 2 && ty < 6) {
                ctx.fillStyle = '#7a7a9a';
                ctx.fillRect(x + 5, y, 5, TILE);
                // Column highlight
                ctx.fillStyle = '#9a9ab8';
                ctx.fillRect(x + 6, y, 2, TILE);
              } else if (ty === 6) {
                // Column base on steps row
                ctx.fillStyle = '#7a7a9a';
                ctx.fillRect(x + 5, y, 5, 10);
              }
            }

            // Doorway: center column at tx===5, lower rows
            if (tx === 5 && (ty === 5 || ty === 6)) {
              ctx.fillStyle = '#000010';
              ctx.fillRect(x + 3, y + (ty === 5 ? 4 : 0), 9, ty === 5 ? TILE - 4 : 10);
              // Amber glow around doorway
              ctx.fillStyle = '#f0d06044';
              ctx.fillRect(x + 2, y + (ty === 5 ? 4 : 0), 1, ty === 5 ? TILE - 4 : 10);
              ctx.fillRect(x + 12, y + (ty === 5 ? 4 : 0), 1, ty === 5 ? TILE - 4 : 10);
              if (ty === 5) {
                ctx.fillStyle = '#f0d06066';
                ctx.fillRect(x + 3, y + 3, 9, 2);
              }
            }
          } else {
            // Generic building tile (outside council area)
            ctx.fillStyle = '#2a2050';
            ctx.fillRect(x, y, TILE, TILE);
            ctx.fillStyle = '#3a3068';
            ctx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);
            // window
            if ((tx + ty) % 3 === 0) {
              ctx.fillStyle = '#f0d060aa';
              ctx.fillRect(x + 4, y + 4, 4, 5);
            }
          }
          break;
        case 4: // tree
          // trunk
          ctx.fillStyle = '#4a2c0a';
          ctx.fillRect(x + 6, y + 10, 4, 6);
          // canopy — season-aware
          if (SEASON === 2) { // autumn: orange canopy
            ctx.fillStyle = '#8b4513';
            ctx.fillRect(x + 2, y + 2, 12, 10);
            ctx.fillStyle = '#a0521a';
            ctx.fillRect(x + 4, y, 8, 6);
          } else if (SEASON === 3) { // winter: white-gray canopy
            ctx.fillStyle = '#b0b8c0';
            ctx.fillRect(x + 2, y + 2, 12, 10);
            ctx.fillStyle = '#c8d0d8';
            ctx.fillRect(x + 4, y, 8, 6);
          } else {
            ctx.fillStyle = '#1a5c1a';
            ctx.fillRect(x + 2, y + 2, 12, 10);
            ctx.fillStyle = '#236623';
            ctx.fillRect(x + 4, y, 8, 6);
          }
          break;
        case 5: // rock
          ctx.fillStyle = '#3a3a4a';
          ctx.fillRect(x + 2, y + 6, 12, 8);
          ctx.fillStyle = '#4e4e60';
          ctx.fillRect(x + 3, y + 4, 10, 7);
          ctx.fillStyle = '#606070';
          ctx.fillRect(x + 5, y + 3, 4, 3);
          break;
      }
    }
  }

  // Pond edge ripple
  for (var ty = 22; ty <= 27; ty++) {
    for (var tc = 4; tc <= 10; tc++) {
      var x = tc * TILE, y = ty * TILE;
      if (tc === 4 || tc === 10 || ty === 22 || ty === 27) {
        ctx.fillStyle = '#2a5a9888';
        ctx.fillRect(x, y, TILE, TILE);
      }
    }
  }

  // Path edge shading
  ctx.fillStyle = '#3a2810aa';
  for (var c = 0; c < COLS; c++) {
    if (MAP[16] && MAP[16][c] === 0) { ctx.fillRect(c*TILE, 16*TILE, TILE, 2); }
    if (MAP[19] && MAP[19][c] === 0) { ctx.fillRect(c*TILE, 19*TILE-2, TILE, 2); }
  }
}

// Cache the static map to an offscreen canvas for performance
var mapCache = document.createElement('canvas');
mapCache.width = W; mapCache.height = H;
var mapCtx = mapCache.getContext('2d');
(function() {
  var save = ctx;
  ctx = mapCtx;
  drawMap();
  ctx = save;
})();

// ── Character sprite drawing ───────────────────────────────────────────────────
function drawCharacter(cx, cy, color, scale, isGalactus) {
  var s = scale || 1;
  var bw = isGalactus ? 14 : 8;   // body width
  var bh = isGalactus ? 20 : 12;  // body height
  var hw = isGalactus ? 12 : 6;   // head width
  var hh = isGalactus ? 10 : 6;   // head height

  // Shadow
  ctx.fillStyle = '#00000044';
  ctx.fillRect(Math.round(cx - bw/2 * s + 2), Math.round(cy + (bh - 2) * s), Math.round(bw * s), Math.round(4 * s));

  // Body
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(cx - bw/2 * s), Math.round(cy + hh * s), Math.round(bw * s), Math.round(bh * s));

  // Head
  ctx.fillStyle = lighten(color, 30);
  ctx.fillRect(Math.round(cx - hw/2 * s), Math.round(cy), Math.round(hw * s), Math.round(hh * s));

  // Eyes (little dark dots)
  ctx.fillStyle = '#00000088';
  ctx.fillRect(Math.round(cx - hw/2 * s + 1*s), Math.round(cy + 2*s), Math.round(1*s), Math.round(2*s));
  ctx.fillRect(Math.round(cx + hw/2 * s - 2*s), Math.round(cy + 2*s), Math.round(1*s), Math.round(2*s));

  if (isGalactus) {
    // Cosmic crown spikes
    ctx.fillStyle = '#a78bfa';
    ctx.fillRect(Math.round(cx - 6*s), Math.round(cy - 8*s), Math.round(4*s), Math.round(8*s));
    ctx.fillRect(Math.round(cx - 2*s), Math.round(cy - 11*s), Math.round(4*s), Math.round(11*s));
    ctx.fillRect(Math.round(cx + 3*s), Math.round(cy - 8*s), Math.round(4*s), Math.round(8*s));
  }
}

function lighten(hex, amt) {
  var r = parseInt(hex.slice(1,3), 16);
  var g = parseInt(hex.slice(3,5), 16);
  var b = parseInt(hex.slice(5,7), 16);
  r = Math.min(255, r + amt); g = Math.min(255, g + amt); b = Math.min(255, b + amt);
  return '#' + ('0' + r.toString(16)).slice(-2) + ('0' + g.toString(16)).slice(-2) + ('0' + b.toString(16)).slice(-2);
}

// ── Speech bubble ──────────────────────────────────────────────────────────────
function drawBubble(cx, cy, lines, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  var pad = 5;
  ctx.font = '9px monospace';
  var lineH = 11;
  // lines can be a string or array
  var lineArr = Array.isArray(lines) ? lines : [lines];
  var maxW = 0;
  lineArr.forEach(function(l) { var w = ctx.measureText(l).width; if (w > maxW) maxW = w; });
  var bw = maxW + pad * 2;
  var bh = lineH * lineArr.length + 4;
  var bx = cx - bw / 2;
  var by = cy - bh - 6;

  // Clamp to canvas
  if (bx < 2) bx = 2;
  if (bx + bw > W - 2) bx = W - 2 - bw;
  if (by < 2) by = 2;

  // Background
  ctx.fillStyle = '#ffffffee';
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 3);
  ctx.fill();

  // Border
  ctx.strokeStyle = '#333355';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Tail
  ctx.fillStyle = '#ffffffee';
  ctx.beginPath();
  ctx.moveTo(cx - 3, by + bh);
  ctx.lineTo(cx + 3, by + bh);
  ctx.lineTo(cx, by + bh + 5);
  ctx.closePath();
  ctx.fill();

  // Text
  ctx.fillStyle = '#111122';
  lineArr.forEach(function(l, i) {
    ctx.fillText(l, bx + pad, by + lineH * (i + 1) - 1);
  });

  ctx.restore();
}

// ── Worn paths (Feature 5) ─────────────────────────────────────────────────────
// Track tile visit counts; reset daily via localStorage
var WORN_TILES = (function() {
  var DAY_MS = 24 * 3600 * 1000;
  var now = Date.now();
  var stored = null;
  try {
    var raw = localStorage.getItem('commons_worn_tiles');
    if (raw) {
      var obj = JSON.parse(raw);
      if (now - obj.ts < DAY_MS) stored = obj;
    }
  } catch(e) {}
  if (!stored) {
    stored = { ts: now, counts: {} };
    try { localStorage.setItem('commons_worn_tiles', JSON.stringify(stored)); } catch(e) {}
  }
  return stored;
})();

function recordTileVisit(tx, ty) {
  var key = tx + ',' + ty;
  WORN_TILES.counts[key] = (WORN_TILES.counts[key] || 0) + 1;
  // Persist every 30 visits (avoid thrashing localStorage)
  var total = WORN_TILES.counts[key];
  if (total % 30 === 0) {
    try { localStorage.setItem('commons_worn_tiles', JSON.stringify(WORN_TILES)); } catch(e) {}
  }
}

function getWornLevel(tx, ty) {
  var key = tx + ',' + ty;
  var count = WORN_TILES.counts[key] || 0;
  if (count >= 30) return 2; // dirt
  if (count >= 10) return 1; // worn
  return 0;
}

// ── NPC Gossip state (Feature 1) ───────────────────────────────────────────────
// gossipBubble: { lines, ttl } — shown like a thought bubble (yellow/italic style)

// ── NPC class ────────────────────────────────────────────────────────────────
var DIRS = [{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}];

function NPC(persona, startTx, startTy) {
  this.name = persona.name;
  this.displayName = persona.display_name || persona.name;
  this.color = COLOR_OVERRIDES[persona.name] || persona.color || '#888888';
  this.role = persona.role || '';
  this.avatarUrl = persona.avatar_url || '';
  this.quips = QUIPS[persona.name] || DEFAULT_QUIPS;

  // Pixel position (center of character)
  this.px = startTx * TILE + TILE / 2;
  this.py = startTy * TILE + TILE / 2;

  // Tile position
  this.tx = startTx;
  this.ty = startTy;

  // Movement params
  var isGalactus = this.name === 'galactus';
  var isKid = this.name === 'the-kid';
  var isIbrahim = this.name === 'chairman';
  var isWolf = this.name === 'wolf';
  var isUncle = this.name === 'uncle-bob';

  this.speed = isGalactus ? 0.2 : isIbrahim ? 0.25 : isKid ? 1.2 : isWolf ? 0.8 : 0.4; // px per frame
  this.isGalactus = isGalactus;
  this.isKid = isKid;
  this.isIbrahim = isIbrahim;
  this.isUncle = isUncle;
  this.isDesigner = this.name === 'designer';
  this.isAdelbert = this.name === 'adelbert';

  // Wander state
  this.dir = { dx: 1, dy: 0 };
  this.stepsLeft = 0;
  this.waitFrames = 0;
  this.frame = Math.floor(Math.random() * 60);

  // Speech state
  this.bubble = null; // {lines: [], ttl} null when silent
  this.speakCooldown = 120 + Math.floor(Math.random() * 240); // frames before can speak again
  this.quipIndex = Math.floor(Math.random() * this.quips.length);

  // Response bubble (from invoke)
  this.responseBubble = null; // {lines: [], ttl}

  // Target for movement
  this.targetPx = this.px;
  this.targetPy = this.py;

  // Congress target tile
  this.congressTarget = null;
  this.inCouncil = false;

  // Drag state
  this.held = false;

  // Gossip state (Feature 1)
  this.gossipBubble = null; // {lines, ttl}
  this.lastSpokenQuip = '';
  this.proximityTimers = {}; // npc.name -> frames spent close

  // Faction post-congress (Feature 2)
  this.factionTarget = null; // NPC to drift toward

  // Last tile (for worn path tracking)
  this.lastTx = this.tx;
  this.lastTy = this.ty;
}

NPC.prototype.pickNewDir = function (npcs) {
  var self = this;

  // Uncle Bob: always picks axis-aligned straight lines (no random turn)
  if (this.isUncle) {
    // Stay on current dir if possible, else turn 90 degrees
    var newTx = this.tx + this.dir.dx;
    var newTy = this.ty + this.dir.dy;
    if (!isBlocked(newTx, newTy)) {
      this.stepsLeft = 6 + Math.floor(Math.random() * 4);
      return;
    }
    // Turn 90
    var perp = this.dir.dx !== 0 ? [{dx:0,dy:1},{dx:0,dy:-1}] : [{dx:1,dy:0},{dx:-1,dy:0}];
    this.dir = perp[Math.floor(Math.random() * 2)];
    this.stepsLeft = 4;
    return;
  }


  // Designer: circular-ish motion
  if (this.isDesigner) {
    // Rotate dir clockwise with some randomness
    var rotate = [{dx:0,dy:-1},{dx:1,dy:0},{dx:0,dy:1},{dx:-1,dy:0}];
    var curIdx = rotate.findIndex(function(d) { return d.dx === self.dir.dx && d.dy === self.dir.dy; });
    if (curIdx < 0) curIdx = 0;
    var nextIdx = (curIdx + 1) % 4;
    var nextDir = rotate[nextIdx];
    var nx = this.tx + nextDir.dx, ny = this.ty + nextDir.dy;
    if (!isBlocked(nx, ny) && Math.random() < 0.6) {
      this.dir = nextDir;
    } else {
      this.dir = rotate[curIdx]; // keep going
    }
    this.stepsLeft = 2 + Math.floor(Math.random() * 4);
    return;
  }

  // Adelbert: try to move toward nearest other NPC
  if (this.isAdelbert && npcs && npcs.length > 1) {
    var target = null, bestDist = 999;
    npcs.forEach(function(n) {
      if (n === self) return;
      var dist = Math.abs(n.tx - self.tx) + Math.abs(n.ty - self.ty);
      if (dist > 1 && dist < bestDist) { bestDist = dist; target = n; }
    });
    if (target && Math.random() < 0.6) {
      var ddx = target.tx - this.tx;
      var ddy = target.ty - this.ty;
      var candidates = [];
      if (Math.abs(ddx) >= Math.abs(ddy)) {
        candidates.push({dx: Math.sign(ddx), dy: 0});
        candidates.push({dx: 0, dy: Math.sign(ddy)});
      } else {
        candidates.push({dx: 0, dy: Math.sign(ddy)});
        candidates.push({dx: Math.sign(ddx), dy: 0});
      }
      for (var i = 0; i < candidates.length; i++) {
        var nd = candidates[i];
        if (!isBlocked(this.tx + nd.dx, this.ty + nd.dy)) {
          this.dir = nd;
          this.stepsLeft = 2 + Math.floor(Math.random() * 3);
          return;
        }
      }
    }
  }

  // Default: pick a random walkable direction
  var valid = DIRS.filter(function(d) {
    return !isBlocked(self.tx + d.dx, self.ty + d.dy);
  });
  if (valid.length === 0) { this.stepsLeft = 10; return; }
  this.dir = valid[Math.floor(Math.random() * valid.length)];
  this.stepsLeft = 2 + Math.floor(Math.random() * (this.isKid ? 8 : this.isGalactus ? 3 : 5));
};

// Step toward a target tile (for congress mode)
NPC.prototype.stepToward = function(targetTx, targetTy) {
  var ddx = targetTx - this.tx;
  var ddy = targetTy - this.ty;
  if (ddx === 0 && ddy === 0) return true; // arrived
  var candidates = [];
  if (Math.abs(ddx) >= Math.abs(ddy)) {
    if (ddx !== 0) candidates.push({dx: Math.sign(ddx), dy: 0});
    if (ddy !== 0) candidates.push({dx: 0, dy: Math.sign(ddy)});
  } else {
    if (ddy !== 0) candidates.push({dx: 0, dy: Math.sign(ddy)});
    if (ddx !== 0) candidates.push({dx: Math.sign(ddx), dy: 0});
  }
  for (var i = 0; i < candidates.length; i++) {
    var nd = candidates[i];
    var nx = this.tx + nd.dx, ny = this.ty + nd.dy;
    if (!isBlocked(nx, ny)) {
      this.dir = nd;
      this.tx = nx; this.ty = ny;
      this.targetPx = nx * TILE + TILE / 2;
      this.targetPy = ny * TILE + TILE / 2;
      this.stepsLeft = 0;
      return false;
    }
  }
  return false; // blocked
};

NPC.prototype.update = function (npcs) {
  // Skip all movement and speech while being dragged
  if (this.held) return;

  this.frame++;

  // Speech cooldown
  if (this.speakCooldown > 0) this.speakCooldown--;
  if (this.bubble) {
    this.bubble.ttl--;
    if (this.bubble.ttl <= 0) {
      this.bubble = null;
      var baseCD = this.isIbrahim ? 600 : this.isGalactus ? 450 : this.isKid ? 80 : 180;
      this.speakCooldown = baseCD + Math.floor(Math.random() * 200);
    }
  } else if (this.speakCooldown <= 0) {
    var chance = this.isIbrahim ? 0.002 : this.isKid ? 0.02 : this.isGalactus ? 0.004 : 0.006;
    if (Math.random() < chance) {
      this.bubble = {
        lines: [this.quips[this.quipIndex % this.quips.length]],
        ttl: Math.round(2.5 * 60),
      };
      this.quipIndex++;
    }
  }

  // Response bubble TTL
  if (this.responseBubble) {
    this.responseBubble.ttl--;
    if (this.responseBubble.ttl <= 0) this.responseBubble = null;
  }

  // Congress mode: if debater, move toward council area
  var isDebater = congressState.active && congressState.debaters.indexOf(this.name) >= 0;
  if (isDebater) {
    // Pick a council tile if we don't have one yet
    if (!this.congressTarget) {
      var idx = Math.floor(Math.random() * COUNCIL_TILES.length);
      this.congressTarget = COUNCIL_TILES[idx];
    }
    // Move toward it every few frames (not every frame — pace it)
    if (this.frame % 20 === 0) {
      var arrived = this.stepToward(this.congressTarget.tx, this.congressTarget.ty);
      this.inCouncil = arrived || (Math.abs(this.tx - this.congressTarget.tx) <= 1 && Math.abs(this.ty - this.congressTarget.ty) <= 1);
    }
  } else {
    this.congressTarget = null;
    this.inCouncil = false;
  }

  // Normal movement when not in council or no congress
  if (!isDebater || !this.inCouncil) {
    // Waiting between moves
    if (this.waitFrames > 0) {
      this.waitFrames--;
      return;
    }

    var dx = this.targetPx - this.px;
    var dy = this.targetPy - this.py;
    var dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < this.speed + 0.5) {
      this.px = this.targetPx;
      this.py = this.targetPy;

      if (this.stepsLeft > 0) {
        var nx = this.tx + this.dir.dx;
        var ny = this.ty + this.dir.dy;
        if (isBlocked(nx, ny)) {
          this.stepsLeft = 0;
        } else {
          this.tx = nx;
          this.ty = ny;
          this.targetPx = nx * TILE + TILE / 2;
          this.targetPy = ny * TILE + TILE / 2;
          this.stepsLeft--;
        }
      } else {
        var pause = this.isKid ? 2 : this.isGalactus ? 30 : this.isIbrahim ? 40 : 8 + Math.floor(Math.random() * 20);
        this.waitFrames = pause;
        this.pickNewDir(npcs);
      }
    } else {
      this.px += (dx / dist) * this.speed;
      this.py += (dy / dist) * this.speed;
    }
  }
};

NPC.prototype.draw = function () {
  var cx = Math.round(this.px);
  var cy = Math.round(this.py) - 14; // top of sprite

  if (this.held) {
    // Draw white glow halo behind character
    ctx.save();
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 12;
    var heldScale = (this.isGalactus ? 1.8 : 1) * 1.3;
    drawCharacter(cx, cy, this.color, heldScale, this.isGalactus);
    ctx.restore();
    // No speech bubbles while held
    return;
  }

  drawCharacter(cx, cy, this.color, this.isGalactus ? 1.8 : 1, this.isGalactus);

  // Response bubble takes priority over quip bubble
  if (this.responseBubble) {
    var alpha = this.responseBubble.ttl > 30 ? 1.0 : this.responseBubble.ttl / 30;
    var headY = cy - 4;
    drawBubble(cx, headY, this.responseBubble.lines, alpha);
  } else if (this.bubble) {
    var alpha = this.bubble.ttl > 20 ? 1.0 : this.bubble.ttl / 20;
    var headY = cy - 4;
    drawBubble(cx, headY, this.bubble.lines, alpha);
  }
};

// ── Spawn positions (pixel centers away from blocked tiles) ────────────────────
var SPAWN_TILES = [
  [13, 9], [27, 10], [12, 22], [35, 28],
  [15, 5], [32, 5],  [5, 14],  [44, 20],
  [20, 12],[38, 12], [10, 29], [30, 22],
  [22, 3], [48, 30],
];

// ── NPC list ─────────────────────────────────────────────────────────────────
var npcs = [];

// ── Tooltip ──────────────────────────────────────────────────────────────────
var tooltip = document.getElementById('tooltip');
var ttName = document.getElementById('tt-name');
var ttRole = document.getElementById('tt-role');
var ttAvatar = document.getElementById('tt-avatar');

canvas.addEventListener('mouseleave', function() {
  tooltip.style.display = 'none';
  if (!dragState) canvas.style.cursor = 'default';
});

// ── Click to invoke ───────────────────────────────────────────────────────────
var invokeOverlay = document.getElementById('invoke-overlay');
var invokeInput = document.getElementById('invoke-input');
var invokePersonaLabel = document.getElementById('invoke-persona-label');
var invokeCancel = document.getElementById('invoke-cancel');
var activeInvokeNPC = null;

// ── Drag state ────────────────────────────────────────────────────────────────
var dragState = null; // null | { npc, startClientX, startClientY, dragging }

function canvasCoords(e) {
  var rect = canvas.getBoundingClientRect();
  return {
    mx: (e.clientX - rect.left) * (W / rect.width),
    my: (e.clientY - rect.top) * (H / rect.height),
  };
}

function npcAtCanvasCoords(mx, my) {
  for (var i = 0; i < npcs.length; i++) {
    var n = npcs[i];
    var dx = mx - n.px;
    var dy = my - (n.py - 8);
    if (Math.abs(dx) < 14 && Math.abs(dy) < 20) return n;
  }
  return null;
}

function nearestValidTile(mx, my) {
  // Convert pixel coords to tile, then spiral out to find non-blocked tile
  var bestTx = Math.round((mx - TILE / 2) / TILE);
  var bestTy = Math.round((my - TILE / 2) / TILE);
  if (!isBlocked(bestTx, bestTy)) return { tx: bestTx, ty: bestTy };
  // Search expanding radius
  for (var r = 1; r <= 8; r++) {
    for (var dy = -r; dy <= r; dy++) {
      for (var dx = -r; dx <= r; dx++) {
        if (Math.abs(dx) !== r && Math.abs(dy) !== r) continue;
        var tx = bestTx + dx, ty = bestTy + dy;
        if (!isBlocked(tx, ty)) return { tx: tx, ty: ty };
      }
    }
  }
  return { tx: bestTx, ty: bestTy }; // fallback
}

canvas.addEventListener('mousedown', function(e) {
  if (e.button !== 0) return;
  var c = canvasCoords(e);
  var found = npcAtCanvasCoords(c.mx, c.my);
  if (!found) return;
  dragState = {
    npc: found,
    startClientX: e.clientX,
    startClientY: e.clientY,
    dragging: false,
  };
  found.held = true;
  e.preventDefault();
});

canvas.addEventListener('mousemove', function(e) {
  // Tooltip logic (only when not dragging)
  if (!dragState || !dragState.dragging) {
    var rect = canvas.getBoundingClientRect();
    var scaleX = W / rect.width;
    var mx = (e.clientX - rect.left) * scaleX;
    var my = (e.clientY - rect.top) * (H / rect.height);

    var found = null;
    for (var i = 0; i < npcs.length; i++) {
      var n = npcs[i];
      var dx = mx - n.px;
      var dy = my - (n.py - 8);
      if (Math.abs(dx) < 14 && Math.abs(dy) < 20) { found = n; break; }
    }

    if (found) {
      ttName.textContent = found.displayName;
      ttRole.textContent = found.role;
      if (found.avatarUrl) {
        ttAvatar.src = found.avatarUrl;
        ttAvatar.style.display = 'block';
      } else {
        ttAvatar.style.display = 'none';
      }
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
      canvas.style.cursor = dragState ? 'grabbing' : 'pointer';
    } else {
      tooltip.style.display = 'none';
      canvas.style.cursor = dragState ? 'grabbing' : 'default';
    }
  }

  if (!dragState) return;

  var ddx = e.clientX - dragState.startClientX;
  var ddy = e.clientY - dragState.startClientY;
  if (!dragState.dragging && Math.sqrt(ddx * ddx + ddy * ddy) >= 5) {
    dragState.dragging = true;
    tooltip.style.display = 'none';
    canvas.style.cursor = 'grabbing';
  }

  if (dragState.dragging) {
    var c = canvasCoords(e);
    dragState.npc.px = c.mx;
    dragState.npc.py = c.my + 20; // offset -20px y means NPC floats 20px above cursor
  }
});

canvas.addEventListener('mouseup', function(e) {
  if (!dragState) return;
  var npc = dragState.npc;
  var wasDragging = dragState.dragging;
  dragState = null;
  npc.held = false;

  if (!wasDragging) {
    // Treat as click — invoke
    activeInvokeNPC = npc;
    invokePersonaLabel.textContent = npc.displayName;
    invokeInput.value = '';
    invokeOverlay.classList.add('active');
    setTimeout(function() { invokeInput.focus(); }, 50);
  } else {
    // Drop — find nearest valid tile
    var tile = nearestValidTile(npc.px, npc.py - 20);
    npc.tx = tile.tx;
    npc.ty = tile.ty;
    npc.px = tile.tx * TILE + TILE / 2;
    npc.py = tile.ty * TILE + TILE / 2;
    npc.targetPx = npc.px;
    npc.targetPy = npc.py;
    npc.stepsLeft = 0;
    npc.waitFrames = 10;
    npc.congressTarget = null;
    npc.pickNewDir(npcs);
    canvas.style.cursor = 'default';
  }
});

invokeCancel.addEventListener('click', function() {
  invokeOverlay.classList.remove('active');
  activeInvokeNPC = null;
});

invokeOverlay.addEventListener('click', function(e) {
  if (e.target === invokeOverlay) {
    invokeOverlay.classList.remove('active');
    activeInvokeNPC = null;
  }
});

invokeInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    var text = invokeInput.value.trim();
    if (!text || !activeInvokeNPC) return;
    var npc = activeInvokeNPC;
    invokeOverlay.classList.remove('active');
    activeInvokeNPC = null;
    // Show a "..." bubble while waiting
    npc.responseBubble = { lines: ['...'], ttl: 600 };
    fetch('/api/invoke-persona', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: npc.name, prompt: text }),
    })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        var raw = (d.response || d.error || 'no response').trim();
        // Wrap to ~40 chars per line, max 3 lines
        var words = raw.split(' ');
        var lines = [], cur = '';
        for (var i = 0; i < words.length; i++) {
          var test = cur ? cur + ' ' + words[i] : words[i];
          if (test.length > 40) { lines.push(cur); cur = words[i]; }
          else cur = test;
        }
        if (cur) lines.push(cur);
        if (lines.length > 3) { lines = lines.slice(0, 3); lines[2] = lines[2].slice(0, 37) + '...'; }
        npc.responseBubble = { lines: lines, ttl: 7 * 60 };
      })
      .catch(function(err) {
        npc.responseBubble = { lines: ['(error: ' + err.message.slice(0,30) + ')'], ttl: 4 * 60 };
      });
  }
  if (e.key === 'Escape') {
    invokeOverlay.classList.remove('active');
    activeInvokeNPC = null;
  }
});

// ── Load personas and init ────────────────────────────────────────────────────
fetch('/api/agents')
  .then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(function(data) {
    var all = [];
    if (data.moderator) all.push(data.moderator);
    if (data.eligible) all = all.concat(data.eligible);
    if (data.meme) all = all.concat(data.meme);
    // Include up to 3 ineligible personas so they can still graze
    if (data.ineligible) all = all.concat(data.ineligible.slice(0, 3));

    // Shuffle spawn positions
    var spawns = SPAWN_TILES.slice();
    for (var i = spawns.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = spawns[i]; spawns[i] = spawns[j]; spawns[j] = tmp;
    }

    all.forEach(function(p, i) {
      var spawnIdx = i % spawns.length;
      var st = spawns[spawnIdx];
      var n = new NPC(p, st[0], st[1]);
      n.pickNewDir(null);
      npcs.push(n);
    });

    startLoop();
  })
  .catch(function(err) {
    document.getElementById('load-error').textContent = 'Could not load personas: ' + err.message;
    // Still start with hardcoded fallback NPCs
    var fallbacks = [
      {name:'chairman', display_name:'Ibrahim the Immovable', color:'#8B1A1A', role:'Chairman', avatar_url:''},
      {name:'critic',   display_name:'Pippi the Pitiless',    color:'#f87171', role:'Critic',   avatar_url:''},
      {name:'architect',display_name:'Kwame the Constructor', color:'#f59e0b', role:'Architect', avatar_url:''},
      {name:'ux',       display_name:'Yuki the Yielding',     color:'#60a5fa', role:'UX',        avatar_url:''},
    ];
    var spawns = SPAWN_TILES.slice(0, 4);
    fallbacks.forEach(function(p, i) {
      var n = new NPC(p, spawns[i][0], spawns[i][1]);
      n.pickNewDir(null);
      npcs.push(n);
    });
    startLoop();
  });

// ── Traces (NPC footprints/thoughts/artifacts) ────────────────────────────────
var tracesData = []; // [{persona_name, trace_type, tile_x, tile_y, content, age_ms}]
var tracesLastFetch = 0;
var TRACES_FETCH_INTERVAL = 30000; // ms

function fetchTraces() {
  var now = Date.now();
  if (now - tracesLastFetch < TRACES_FETCH_INTERVAL) return;
  tracesLastFetch = now;
  fetch('/api/commons/traces')
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(d) { if (d && d.traces) tracesData = d.traces; })
    .catch(function() {});
}

function drawTraces() {
  var STALE_MS = 10 * 60 * 1000; // fade out over last minute before expiry (7 days)
  for (var i = 0; i < tracesData.length; i++) {
    var t = tracesData[i];
    var px = t.tile_x * TILE + TILE / 2;
    var py = t.tile_y * TILE + TILE / 2;
    var alpha = Math.max(0.1, Math.min(1, 1 - (t.age_ms / (7 * 24 * 3600 * 1000))));

    ctx.save();
    ctx.globalAlpha = alpha * 0.55;

    if (t.trace_type === 'footprint') {
      // Small dots representing footsteps
      ctx.fillStyle = COLOR_OVERRIDES[t.persona_name] || '#aaaaaa';
      ctx.beginPath();
      ctx.arc(px - 3, py + 2, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(px + 3, py - 2, 2, 0, Math.PI * 2);
      ctx.fill();
    } else if (t.trace_type === 'thought') {
      // Small speech bubble dot
      ctx.fillStyle = COLOR_OVERRIDES[t.persona_name] || '#aaaaaa';
      ctx.beginPath();
      ctx.arc(px, py, 3, 0, Math.PI * 2);
      ctx.fill();
      // Tiny thought dots above
      ctx.beginPath(); ctx.arc(px, py - 6, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(px + 3, py - 9, 1, 0, Math.PI * 2); ctx.fill();
    } else if (t.trace_type === 'artifact') {
      // Small diamond
      ctx.strokeStyle = COLOR_OVERRIDES[t.persona_name] || '#aaaaaa';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(px, py - 4);
      ctx.lineTo(px + 4, py);
      ctx.lineTo(px, py + 4);
      ctx.lineTo(px - 4, py);
      ctx.closePath();
      ctx.stroke();
    }

    ctx.restore();
  }
}

// ── Multiplayer: local player + remote players ────────────────────────────────
var ADJECTIVES = ['swift','quiet','bold','bright','calm','dark','wild','keen','kind','proud','fierce','gentle','silver','gold','iron','lost','found','lone','brave','odd'];
var ANIMALS = ['fox','bear','wolf','deer','hawk','owl','crow','lynx','seal','elk','hare','mole','wren','kite','vole','newt','toad','crab','ibis','moth'];

function genPlayerName() {
  var stored = sessionStorage.getItem('commons_player_name');
  if (stored) return stored;
  var adj = ADJECTIVES[Math.floor(Math.random() * ADJECTIVES.length)];
  var ani = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
  var name = adj + '-' + ani;
  sessionStorage.setItem('commons_player_name', name);
  return name;
}

function genPlayerColor() {
  var stored = sessionStorage.getItem('commons_player_color');
  if (stored) return stored;
  var hue = Math.floor(Math.random() * 360);
  var color = 'hsl(' + hue + ',70%,65%)';
  // Convert to hex-ish for consistency
  var c = document.createElement('canvas');
  c.width = 1; c.height = 1;
  var cx2 = c.getContext('2d');
  cx2.fillStyle = color;
  cx2.fillRect(0, 0, 1, 1);
  var d = cx2.getImageData(0, 0, 1, 1).data;
  var hex = '#' + ('0' + d[0].toString(16)).slice(-2) + ('0' + d[1].toString(16)).slice(-2) + ('0' + d[2].toString(16)).slice(-2);
  sessionStorage.setItem('commons_player_color', hex);
  return hex;
}

var localPlayer = {
  tx: 13, ty: 20, // start in open grass area
  px: 0, py: 0,
  name: genPlayerName(),
  color: genPlayerColor(),
};
localPlayer.px = localPlayer.tx * TILE + TILE / 2;
localPlayer.py = localPlayer.ty * TILE + TILE / 2;

var remotePlayers = {}; // id -> {x, y, name, color, ts}
var keysDown = {};

document.addEventListener('keydown', function(e) {
  keysDown[e.key] = true;
});
document.addEventListener('keyup', function(e) {
  delete keysDown[e.key];
});

var lastMoveFrame = 0;
var MOVE_INTERVAL = 8; // frames between moves (at 60fps ~133ms per step)

function triggerAreaTransition(url) {
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#000;opacity:0;z-index:999;pointer-events:none;transition:opacity 0.5s ease;';
  document.body.appendChild(overlay);
  // Force reflow so the transition fires
  overlay.offsetHeight;
  overlay.style.opacity = '1';
  setTimeout(function() {
    window.location.href = url;
  }, 500);
}

function updateLocalPlayer() {
  lastMoveFrame++;
  if (lastMoveFrame < MOVE_INTERVAL) return;
  lastMoveFrame = 0;

  var dx = 0, dy = 0;
  if (keysDown['ArrowLeft']  || keysDown['a'] || keysDown['A']) dx = -1;
  if (keysDown['ArrowRight'] || keysDown['d'] || keysDown['D']) dx = 1;
  if (keysDown['ArrowUp']    || keysDown['w'] || keysDown['W']) dy = -1;
  if (keysDown['ArrowDown']  || keysDown['s'] || keysDown['S']) dy = 1;

  if (dx === 0 && dy === 0) return;

  var nx = localPlayer.tx + dx;
  var ny = localPlayer.ty + dy;
  if (!isBlocked(nx, ny)) {
    localPlayer.tx = nx;
    localPlayer.ty = ny;
    localPlayer.px = nx * TILE + TILE / 2;
    localPlayer.py = ny * TILE + TILE / 2;
    sendPlayerMove();

    // Congress building entry: doorway and just inside
    if ((localPlayer.tx === 5 && localPlayer.ty === 5) ||
        (localPlayer.tx >= 4 && localPlayer.tx <= 6 && localPlayer.ty === 4)) {
      triggerAreaTransition('https://clung.us/congress');
    }
  }
}

function drawLocalPlayer() {
  var cx = Math.round(localPlayer.px);
  var cy = Math.round(localPlayer.py) - 14;

  // White glow to distinguish from NPCs
  ctx.save();
  ctx.shadowColor = '#ffffff';
  ctx.shadowBlur = 8;
  drawCharacter(cx, cy, localPlayer.color, 1, false);
  ctx.restore();

  // Name label above
  ctx.save();
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(localPlayer.name, cx, cy - 3);
  ctx.restore();
}

function drawRemotePlayers() {
  var now = Date.now();
  var toDelete = [];
  for (var id in remotePlayers) {
    var p = remotePlayers[id];
    if (now - p.ts > 10000) { toDelete.push(id); continue; }
    var cx = p.x * TILE + TILE / 2;
    var cy = p.y * TILE + TILE / 2 - 14;

    // Draw sprite
    drawCharacter(cx, cy, p.color, 1, false);

    // Small dot indicator above head
    ctx.save();
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(cx, cy - 5, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  for (var j = 0; j < toDelete.length; j++) delete remotePlayers[toDelete[j]];
}

// ── WebSocket connection ──────────────────────────────────────────────────────
var commonsWs = null;
var wsReconnectTimer = null;

function connectCommonsWs() {
  if (commonsWs && (commonsWs.readyState === WebSocket.OPEN || commonsWs.readyState === WebSocket.CONNECTING)) return;

  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  var url = proto + '//' + location.host + '/api/commons/ws';
  commonsWs = new WebSocket(url);

  commonsWs.onopen = function() {
    // Send initial position
    sendPlayerMove();
  };

  commonsWs.onmessage = function(e) {
    var msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    if (msg.type === 'players') {
      remotePlayers = {};
      for (var id in msg.players) {
        // Don't render self (we don't know our own id from server, so we filter by name+pos match)
        var p = msg.players[id];
        if (p.name === localPlayer.name && p.x === localPlayer.tx && p.y === localPlayer.ty) continue;
        remotePlayers[id] = { x: p.x, y: p.y, name: p.name, color: p.color, ts: p.ts };
      }
    }
  };

  commonsWs.onclose = function() {
    commonsWs = null;
    // Reconnect after 3s
    if (!wsReconnectTimer) {
      wsReconnectTimer = setTimeout(function() { wsReconnectTimer = null; connectCommonsWs(); }, 3000);
    }
  };

  commonsWs.onerror = function() {
    // onclose will fire after onerror, so reconnect handled there
  };
}

function sendPlayerMove() {
  if (!commonsWs || commonsWs.readyState !== WebSocket.OPEN) return;
  commonsWs.send(JSON.stringify({
    type: 'move',
    x: localPlayer.tx,
    y: localPlayer.ty,
    name: localPlayer.name,
    color: localPlayer.color,
  }));
}

// Start WebSocket connection after personas are loaded (startLoop is called)
var wsStarted = false;
function maybeStartWs() {
  if (wsStarted) return;
  wsStarted = true;
  connectCommonsWs();
}

// ── Game loop ─────────────────────────────────────────────────────────────────
var loopStarted = false;
function startLoop() {
  if (loopStarted) return;
  loopStarted = true;
  maybeStartWs();
  requestAnimationFrame(loop);
}

function loop() {
  // Fetch traces periodically
  fetchTraces();

  // Update all NPCs
  for (var i = 0; i < npcs.length; i++) {
    npcs[i].update(npcs);
  }

  // Update local player (keyboard movement)
  updateLocalPlayer();

  // Draw map (cached)
  ctx.drawImage(mapCache, 0, 0);

  // Draw NPC traces (footprints, thoughts, artifacts)
  drawTraces();

  // Sort NPCs by y position (painter's algorithm)
  var sorted = npcs.slice().sort(function(a,b) { return a.py - b.py; });
  for (var i = 0; i < sorted.length; i++) {
    sorted[i].draw();
  }

  // Draw remote players (other visitors)
  drawRemotePlayers();

  // Draw local player (always on top)
  drawLocalPlayer();

  // ── Time of day overlay ──────────────────────────────────────────────────
  var tov = getTimeOverlay();
  if (tov) {
    ctx.save();
    ctx.fillStyle = 'rgba(' + tov.r + ',' + tov.g + ',' + tov.b + ',' + tov.a + ')';
    ctx.fillRect(0, 0, W, H);
    if (tov.stars) {
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      for (var si = 0; si < STAR_POS.length; si++) {
        // Twinkle: show only ~80% each frame
        if (Math.random() < 0.8) {
          ctx.fillRect(STAR_POS[si].x, STAR_POS[si].y, 1, 1);
        }
      }
    }
    ctx.restore();
  }

  // ── Congress badge ────────────────────────────────────────────────────────
  if (congressState.active) {
    ctx.save();
    var badgeText = '⚖️ in session';
    ctx.font = 'bold 11px monospace';
    var bw = ctx.measureText(badgeText).width + 16;
    var bh = 20;
    var bx = W - bw - 6;
    var by = 6;
    ctx.fillStyle = '#1a0a3a';
    ctx.beginPath();
    ctx.roundRect(bx, by, bw, bh, 4);
    ctx.fill();
    ctx.strokeStyle = '#a78bfa';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = '#e0d0ff';
    ctx.textAlign = 'left';
    ctx.fillText(badgeText, bx + 8, by + bh - 5);
    ctx.restore();
  }

  // "The Commons" title overlay (pixel-ish style)
  ctx.save();
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#00000088';
  ctx.fillText('The Commons', W/2 + 1, 22);
  ctx.fillStyle = '#4ecca3';
  ctx.fillText('The Commons', W/2, 21);
  ctx.restore();

  // Council building label
  ctx.save();
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#00000066';
  ctx.fillText('CONGRESS', 5*TILE + TILE/2 + 1, 2*TILE - 2);
  ctx.fillStyle = '#c8c8e8';
  ctx.fillText('CONGRESS', 5*TILE + TILE/2, 2*TILE - 3);
  ctx.restore();

  requestAnimationFrame(loop);
}

})();
</script>

<!-- YouTube IFrame API ambient soundtrack -->
<script>
(function() {
  var ytPlayer = null;
  var playerReady = false;
  var musicStarted = false;
  var btn = document.getElementById('music-btn');

  // Load YouTube IFrame API
  var tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  var firstScript = document.getElementsByTagName('script')[0];
  firstScript.parentNode.insertBefore(tag, firstScript);

  window.onYouTubeIframeAPIReady = function() {
    ytPlayer = new YT.Player('yt-player', {
      width: '1',
      height: '1',
      videoId: 'cJQQrI7nCeY',
      playerVars: {
        autoplay: 0,
        loop: 1,
        playlist: 'cJQQrI7nCeY',
        controls: 0,
        disablekb: 1,
        fs: 0,
        iv_load_policy: 3,
        modestbranding: 1,
        rel: 0
      },
      events: {
        onReady: function() {
          playerReady = true;
        }
      }
    });
  };

  btn.addEventListener('click', function() {
    if (!playerReady || !ytPlayer) return;

    if (!musicStarted) {
      // First click: start playing
      ytPlayer.unMute();
      ytPlayer.setVolume(50);
      ytPlayer.playVideo();
      musicStarted = true;
      btn.textContent = '🎵';
    } else {
      // Subsequent clicks: toggle mute
      if (ytPlayer.isMuted()) {
        ytPlayer.unMute();
        btn.textContent = '🎵';
      } else {
        ytPlayer.mute();
        btn.textContent = '🔇';
      }
    }
  });
})();
</script>
