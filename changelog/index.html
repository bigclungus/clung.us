<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Changelog — hello.clung.us</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/sitenav.css?v=2">
  <script src="/sitenav.js?v=2" defer></script>
  <style>
    body {
      margin: 0;
      padding: 2rem;
      background: var(--bg);
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
      transition: background 0.2s ease, color 0.2s ease;
    }
    h1 {
      color: var(--accent);
      text-shadow: 0 0 12px var(--accent);
      margin-bottom: 0.5rem;
    }
    .meta {
      font-size: 0.8rem;
      color: var(--text);
      opacity: 0.5;
      margin-bottom: 2rem;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    #changelog-content h2 {
      color: var(--accent);
      border-bottom: 1px solid var(--accent);
      padding-bottom: 0.3rem;
      margin-top: 2rem;
    }
    #changelog-content h3 {
      color: var(--text);
      opacity: 0.8;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 1.2rem;
      margin-bottom: 0.4rem;
    }
    #changelog-content ul {
      margin: 0;
      padding-left: 1.4em;
    }
    #changelog-content li {
      line-height: 1.7;
    }
    #changelog-content code {
      background: rgba(255,255,255,0.07);
      padding: 0.1em 0.3em;
      border-radius: 3px;
      font-family: inherit;
    }
    .loading {
      opacity: 0.5;
      font-style: italic;
    }
    .error {
      color: #f87171;
    }
  </style>
</head>
<body>
  <h1>changelog</h1>
  <div class="meta">auto-generated from git history · <a href="/api/changelog">raw markdown</a> · <a href="/">← back</a></div>

  <div id="changelog-content"><span class="loading">loading…</span></div>

  <script>
    async function loadChangelog() {
      const el = document.getElementById('changelog-content');
      try {
        const res = await fetch('/api/changelog');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const md = await res.text();
        el.innerHTML = renderMarkdown(md);
      } catch (e) {
        el.innerHTML = `<span class="error">failed to load changelog: ${e.message}</span>`;
      }
    }

    function renderMarkdown(md) {
      // Minimal markdown renderer: h1/h2/h3, ul/li, code, bold, links, paragraphs
      const lines = md.split('\n');
      let html = '';
      let inList = false;

      for (let i = 0; i < lines.length; i++) {
        let line = lines[i];

        // Headings
        if (line.startsWith('### ')) {
          if (inList) { html += '</ul>'; inList = false; }
          html += `<h3>${escape(line.slice(4))}</h3>`;
          continue;
        }
        if (line.startsWith('## ')) {
          if (inList) { html += '</ul>'; inList = false; }
          html += `<h2>${escape(line.slice(3))}</h2>`;
          continue;
        }
        if (line.startsWith('# ')) {
          if (inList) { html += '</ul>'; inList = false; }
          // skip top-level h1 since we have the page h1
          continue;
        }

        // List items
        if (line.match(/^[-*] /)) {
          if (!inList) { html += '<ul>'; inList = true; }
          const content = inlineFormat(line.slice(2));
          html += `<li>${content}</li>`;
          continue;
        }

        // Empty line
        if (line.trim() === '') {
          if (inList) { html += '</ul>'; inList = false; }
          continue;
        }

        // Regular paragraph line
        if (inList) { html += '</ul>'; inList = false; }
        html += `<p>${inlineFormat(line)}</p>`;
      }

      if (inList) html += '</ul>';
      return html;
    }

    function escape(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function inlineFormat(s) {
      // backtick code
      s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
      // bold **...**
      s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      // links [text](url)
      s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
      // escape remaining <> that aren't already tags
      return s;
    }

    loadChangelog();
  </script>
</body>
</html>
