<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Deaths of Centronias</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/sitenav.css">
  <script src="/sitenav.js" defer></script>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: var(--bg);
      font-family: 'JetBrains Mono', monospace;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
      padding: 3rem 1rem 4rem;
      box-sizing: border-box;
    }

    h1 {
      color: var(--accent);
      font-size: 2.4rem;
      text-shadow: 0 0 20px var(--accent);
      margin: 0 0 0.3rem;
      text-align: center;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin: 0 0 2.5rem;
      letter-spacing: 0.05em;
    }

    .death-count {
      font-size: 5rem;
      color: var(--accent);
      text-shadow: 0 0 30px var(--accent);
      font-weight: 800;
      line-height: 1;
      margin-bottom: 0.2rem;
    }

    .death-label {
      color: var(--text-muted);
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    .coffins {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      max-width: 700px;
    }

    .coffin {
      font-size: 3.5rem;
      line-height: 1;
      filter: drop-shadow(0 0 8px rgba(233, 69, 96, 0.4));
      animation: coffin-fade-in 0.4s ease both;
    }

    .coffin:nth-child(1) { animation-delay: 0.1s; }
    .coffin:nth-child(2) { animation-delay: 0.25s; }
    .coffin:nth-child(3) { animation-delay: 0.4s; }
    .coffin:nth-child(4) { animation-delay: 0.55s; }
    .coffin:nth-child(5) { animation-delay: 0.7s; }

    @keyframes coffin-fade-in {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .killed-by {
      margin-top: 2.5rem;
      border-left: 3px solid var(--accent);
      padding: 0.7rem 1rem;
      color: var(--text-dim);
      font-size: 0.85rem;
      line-height: 1.7;
      max-width: 420px;
      text-align: left;
    }

    .killed-by strong {
      color: var(--accent);
    }

    /* ── Mobile responsive ── */
    @media (max-width: 768px) {
      h1 {
        font-size: 1.7rem;
      }
      .death-count {
        font-size: 3.5rem;
      }
      .coffin {
        font-size: 2.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>The Deaths of Centronias</h1>
    <div class="subtitle">a faithful record</div>

    <div class="death-count" id="death-count"></div>
    <div class="death-label">confirmed deaths</div>

    <div class="coffins" id="coffins"></div>

    <div class="killed-by">
      All deaths attributed to <strong>Clungus</strong>. Circumstances vary. Outcome does not.
    </div>
  </div>

  <script>
    // ── Update this number to record a new death ──
    var DEATH_COUNT = 2;

    document.getElementById('death-count').textContent = DEATH_COUNT;

    var coffinsEl = document.getElementById('coffins');
    for (var i = 0; i < DEATH_COUNT; i++) {
      var span = document.createElement('span');
      span.className = 'coffin';
      span.textContent = '⚰️';
      coffinsEl.appendChild(span);
    }
  </script>

</body>
</html>
