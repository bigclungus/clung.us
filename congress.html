<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>congress — clung.us</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/sitenav.css?v=2">
  <script src="/sitenav.js?v=2" defer></script>
  <style>
    :root {
      --card-bg: #22223a;
      --card-border: #333350;
      --panel-bg: #16162a;
      --panel-border: #2a2a45;
      --seat-bg: #1e1e38;
      --seat-border: #333355;
      --fired-bg: #1a1226;
      --fired-border: #3a2040;
      --btn-bg: #22223a;
      --btn-border: #444466;
      --node-idle: #22223a;
      --node-border-idle: #444466;
      --node-border-active: #e94560;
      --node-border-done: #4ecca3;
      --bubble-bg: #1e1e38;
      --bubble-border: #444466;
      --review-bg: #141425;
      --teal: #4ecca3;
    }
    [data-theme="light"] {
      --card-bg: #fff8ea;
      --card-border: #d0c9b0;
      --panel-bg: #f0ece0;
      --panel-border: #ccc4a8;
      --seat-bg: #fdf6e3;
      --seat-border: #d0c9b0;
      --fired-bg: #f5e8f0;
      --fired-border: #c8a8c0;
      --btn-bg: #ede7d4;
      --btn-border: #bbb5a0;
      --node-idle: #f5efe0;
      --node-border-idle: #c9b8a0;
      --node-border-active: #e94560;
      --node-border-done: #2aa198;
      --bubble-bg: #ede7d4;
      --bubble-border: #c9b8a0;
      --review-bg: #f0e8d8;
      --teal: #2aa198;
    }

    body {
      margin: 0;
      background: var(--bg);
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
      transition: background 0.2s ease, color 0.2s ease;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Three-column layout ── */
    .congress-layout {
      flex: 1;
      display: grid;
      grid-template-columns: 240px 1fr 210px;
      min-height: 0;
    }

    /* ── Shared sidebar styles ── */
    .sidebar {
      background: var(--panel-bg);
      display: flex;
      flex-direction: column;
      border-top: none;
      overflow: hidden;
    }
    .sidebar-left { border-right: 1px solid var(--panel-border); }
    .sidebar-right { border-left: 1px solid var(--panel-border); }

    .sidebar-header {
      padding: 11px 13px 9px;
      border-bottom: 1px solid var(--panel-border);
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-shrink: 0;
    }
    .sidebar-header h2 {
      margin: 0;
      font-size: 0.7rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      text-shadow: 0 0 7px var(--accent);
    }
    .sidebar-header .count-badge {
      font-size: 0.6rem;
      color: var(--text-muted);
    }

    .sidebar-body {
      flex: 1;
      padding: 9px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      overflow-y: auto;
    }

    /* ── Roster seat card ── */
    .seat-card {
      background: var(--seat-bg);
      border: 1px solid var(--seat-border);
      border-radius: 4px;
      padding: 9px 10px;
      display: flex;
      align-items: center;
      gap: 9px;
      position: relative;
      transition: border-color 0.15s, box-shadow 0.15s;
      min-height: 54px;
    }
    .seat-card.occupied {
      border-color: var(--sc, var(--accent));
      box-shadow: 0 0 5px color-mix(in srgb, var(--sc, var(--accent)) 25%, transparent);
    }
    .seat-card.empty {
      opacity: 0.3;
      border-style: dashed;
    }
    .seat-num {
      position: absolute;
      top: 3px;
      right: 6px;
      font-size: 0.5rem;
      color: var(--text-muted);
      opacity: 0.45;
    }
    .seat-emoji { font-size: 1.3rem; flex-shrink: 0; line-height: 1; }
    .seat-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; }
    .seat-info { flex: 1; min-width: 0; }
    .seat-name {
      font-size: 0.73rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .seat-desc {
      font-size: 0.58rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }
    .btn-remove {
      background: none;
      border: 1px solid transparent;
      color: var(--text-muted);
      font-size: 0.6rem;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 3px;
      flex-shrink: 0;
      transition: color 0.12s, border-color 0.12s;
    }
    .btn-remove:hover { color: var(--accent); border-color: var(--accent); }

    /* ── Fired card (severance) — same layout as seat-card ── */
    .fired-card {
      background: var(--fired-bg);
      border: 1px solid var(--fired-border);
      border-radius: 4px;
      padding: 9px 10px;
      display: flex;
      align-items: center;
      gap: 9px;
      position: relative;
      min-height: 54px;
      border-color: color-mix(in srgb, var(--sc, var(--fired-border)) 50%, var(--fired-border));
    }
    .fired-reason { font-size: 0.55rem; color: var(--text-muted); font-style: italic; line-height: 1.4; margin-top: 2px; }
    .btn-reinstate {
      background: none;
      border: 1px solid transparent;
      color: var(--text-muted);
      font-size: 0.6rem;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 3px;
      flex-shrink: 0;
      transition: color 0.12s, border-color 0.12s;
    }
    .btn-reinstate:hover { color: var(--accent); border-color: var(--accent); }

    .sidebar-empty {
      font-size: 0.67rem;
      color: var(--text-muted);
      opacity: 0.45;
      text-align: center;
      padding: 18px 6px;
    }

    /* ── Center arena column ── */
    .arena-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
      padding: 20px 16px 32px;
      gap: 16px;
    }

    .page-header {
      text-align: center;
    }
    .page-header h1 {
      margin: 0 0 3px;
      font-size: 1.4rem;
      color: var(--accent);
      text-shadow: 0 0 14px var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .session-badge {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
      border-radius: 4px;
      padding: 2px 8px;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .page-header .subtitle {
      color: var(--text-muted);
      font-size: 0.72rem;
    }

    /* ── Session list (sidebar version) ── */
    .sidebar-session-item {
      background: var(--seat-bg);
      border: 1px solid var(--seat-border);
      border-radius: 4px;
      padding: 7px 9px;
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      text-decoration: none;
      color: inherit;
      font-size: 0.68rem;
    }
    .sidebar-session-item:hover { border-color: var(--accent); }
    .sidebar-session-item.selected {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 8%, var(--seat-bg));
    }
    .sidebar-session-item.deliberating {
      box-shadow: 0 0 6px color-mix(in srgb, #f59e0b 30%, transparent);
      border-color: color-mix(in srgb, #f59e0b 50%, var(--seat-border));
    }
    .sidebar-session-num {
      font-size: 0.62rem;
      font-weight: 700;
      color: var(--accent);
      min-width: 26px;
      flex-shrink: 0;
    }
    .sidebar-session-topic {
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 0.65rem;
      color: var(--text);
    }
    .session-list-empty {
      font-size: 0.67rem;
      color: var(--text-muted);
      opacity: 0.45;
      padding: 10px 4px;
    }

    /* ── Legacy session-list-panel (center) — hidden, replaced by sidebar ── */
    .session-list-panel { display: none !important; }

    /* ── Sidebar section divider ── */
    .sidebar-section-divider {
      padding: 8px 9px 4px;
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      border-top: 1px solid var(--panel-border);
      margin-top: 4px;
      flex-shrink: 0;
    }

    /* Compact session items */
    .session-item {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 4px;
      padding: 10px 13px;
      margin-bottom: 7px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.15s;
      text-decoration: none;
      color: inherit;
    }
    .session-item:hover { border-color: var(--accent); }
    .session-item-num {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent);
      min-width: 38px;
      flex-shrink: 0;
    }
    .session-item-body { flex: 1; min-width: 0; }
    .session-item-topic {
      font-size: 0.75rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-item-meta {
      font-size: 0.58rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .session-item-status {
      font-size: 0.6rem;
      color: var(--text-muted);
      border: 1px solid var(--card-border);
      border-radius: 3px;
      padding: 2px 6px;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .session-item-status.deliberating { color: var(--accent); border-color: var(--accent); }
    .session-item-status.complete { color: var(--teal); border-color: var(--teal); }

    /* ── Circle visual ── */
    .arena {
      position: relative;
      width: min(440px, 80vw);
      height: min(440px, 80vw);
      flex-shrink: 0;
    }

    .center-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 110px;
      height: 110px;
      text-align: center;
      font-size: 0.68rem;
      color: var(--text-muted);
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--panel-bg);
      border: 2px solid var(--accent);
      border-radius: 14px;
      box-shadow: 0 0 16px color-mix(in srgb, var(--accent) 20%, transparent);
      z-index: 3;
      gap: 2px;
    }
    .center-label .mod-emoji { font-size: 1.5rem; display: block; line-height: 1; }
    .center-label .mod-name { font-size: 0.6rem; color: var(--accent); text-shadow: 0 0 6px var(--accent); text-transform: uppercase; letter-spacing: 0.08em; }
    .center-label .mod-role { font-size: 0.48rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .center-label .mod-deliberating {
      font-size: 0.5rem;
      color: #f59e0b;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      display: none;
    }
    .center-label.deliberating-active .mod-deliberating { display: block; }
    /* Remove task-preview from center — topic shown in topic-display bar above */
    .center-label .task-preview { display: none; }

    /* Persona nodes around circle */
    .persona-node {
      position: absolute;
      width: 96px;
      height: 96px;
      transform: translate(-50%, -50%);
      cursor: default;
      z-index: 2;
    }
    .persona-node .node-circle {
      width: 96px;
      min-height: 96px;
      border-radius: 12px;
      background: var(--node-idle);
      border: 2px solid var(--node-border-idle);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 6px 4px;
      box-sizing: border-box;
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
    }
    .persona-node.empty-node .node-circle {
      opacity: 0.2;
      border-style: dashed;
    }
    .persona-node .node-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .persona-node .node-emoji { font-size: 1.45rem; line-height: 1; }
    .persona-node .node-display-name {
      font-size: 0.48rem;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      max-width: 86px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      transition: color 0.3s;
    }
    .persona-node .node-title {
      font-size: 0.40rem;
      color: var(--text-muted);
      text-align: center;
      max-width: 86px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 0px;
    }
    .persona-node.active .node-circle {
      background: #2a1520;
      border-color: var(--node-border-active);
      box-shadow: 0 0 20px var(--accent), 0 0 40px rgba(233,69,96,0.3);
    }
    .persona-node.active .node-display-name { color: var(--accent); }
    .persona-node.done .node-circle {
      background: #102820;
      border-color: var(--node-border-done);
      box-shadow: 0 0 10px rgba(78,204,163,0.3);
    }
    .persona-node.done .node-display-name { color: var(--teal); }

    @keyframes dotpulse {
      0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
      30% { opacity: 1; transform: scale(1.1); }
    }

    /* Status line */
    .status-line {
      text-align: center;
      font-size: 0.68rem;
      color: var(--text-muted);
      min-height: 1.1em;
    }

    /* ── Session hint banner ── */
    .session-hint {
      display: none;
      width: 100%;
      max-width: 520px;
      font-size: 0.62rem;
      color: var(--text-muted);
      box-sizing: border-box;
      padding: 2px 0 0;
      opacity: 0.6;
    }
    .session-hint strong { color: var(--text-muted); }
    .session-hint code { color: var(--teal); font-size: 0.65rem; }

    /* ── Status badge dots ── */
    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
      flex-shrink: 0;
    }
    .status-dot.deliberating {
      background: #f59e0b;
      animation: pulse-dot 1.2s infinite;
    }
    .status-dot.complete { background: #4ecca3; }
    .status-dot.failed { background: #e94560; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }
    .session-item-status { display: flex; align-items: center; }

    .btn {
      padding: 9px 18px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--text);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); opacity: 1; }
    .btn-yes { background: #2d6a4f; }
    .btn-yes:hover { background: #3a8c66; opacity: 1; }
    .btn-no { background: #6b2737; }
    .btn-no:hover { background: #8c3347; opacity: 1; }

    /* ── Review bar ── */
    .review-bar {
      background: var(--review-bg);
      border: 1px solid var(--card-border);
      border-top: 2px solid var(--accent);
      border-radius: 4px;
      padding: 16px 18px;
      display: none;
      width: 100%;
      max-width: 520px;
      box-sizing: border-box;
    }
    .review-bar.visible { display: block; }
    .review-label {
      font-size: 0.65rem;
      color: var(--accent);
      letter-spacing: 0.12em;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .review-synthesis {
      font-size: 0.78rem;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 14px;
      border-left: 3px solid var(--accent);
      padding-left: 10px;
    }
    .review-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .verdict-msg {
      margin-top: 12px;
      font-size: 0.75rem;
      padding: 7px 11px;
      border-radius: 4px;
      display: none;
    }
    .verdict-msg.yes { background: #102820; border: 1px solid var(--teal); color: var(--teal); display: block; }
    .verdict-msg.no { background: #200d10; border: 1px solid var(--accent); color: var(--accent); display: block; }
    .verdict-msg.again { background: var(--card-bg); border: 1px solid var(--card-border); color: var(--text-muted); display: block; }

    /* ── Reinstate modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 6px;
      padding: 18px 22px;
      max-width: 320px;
      width: 92%;
    }
    .modal h3 { margin: 0 0 5px; font-size: 0.88rem; color: var(--accent); }
    .modal p { font-size: 0.72rem; color: var(--text-muted); margin: 0 0 14px; line-height: 1.5; }
    .modal-seats { display: flex; flex-direction: column; gap: 7px; margin-bottom: 12px; }
    .modal-seat-btn {
      background: var(--seat-bg);
      border: 1px solid var(--seat-border);
      border-radius: 4px;
      padding: 9px 11px;
      display: flex;
      align-items: center;
      gap: 9px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
      transition: border-color 0.12s;
      text-align: left;
    }
    .modal-seat-btn:hover { border-color: var(--accent); }
    .modal-seat-btn.empty-slot .slot-name { color: var(--text-muted); font-style: italic; }
    .slot-emoji { font-size: 1.05rem; }
    .slot-info { flex: 1; min-width: 0; }
    .slot-name { font-size: 0.72rem; font-weight: 700; }
    .slot-num { font-size: 0.57rem; color: var(--text-muted); }
    .btn-cancel {
      background: none;
      border: 1px solid var(--btn-border);
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s;
    }
    .btn-cancel:hover { color: var(--accent); border-color: var(--accent); }

    /* ── Mobile ── */
    @media (max-width: 860px) {
      .congress-layout {
        grid-template-columns: 1fr;
      }
      .sidebar-left { order: 2; border-right: none; border-bottom: 1px solid var(--panel-border); }
      .arena-col { order: 1; }
      .sidebar-right { order: 3; border-left: none; border-top: 1px solid var(--panel-border); }
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a0f; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
    * { scrollbar-width: thin; scrollbar-color: #333 #0a0a0f; }

    /* ── Speech bubbles (in-arena, beside each node) ── */
    .arena {
      overflow: visible; /* allow bubbles to extend beyond arena bounds */
    }
    .node-bubble {
      position: absolute;
      width: 150px;
      max-height: 100px;
      overflow-y: auto;
      background: var(--bubble-bg);
      border: 1px solid var(--bubble-border);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 0.65rem;
      line-height: 1.4;
      color: var(--text);
      display: none;
      z-index: 5;
      top: 50%;
      transform: translateY(-50%);
      animation: bubbleFadeIn 0.25s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .node-bubble.visible { display: block; }
    /* Bubble tail pseudo-element */
    .node-bubble::before {
      content: '';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      border: 6px solid transparent;
    }
    /* Right-side bubble: bubble is to the right of the node */
    .persona-node.bubble-right .node-bubble {
      left: calc(100% + 10px);
    }
    .persona-node.bubble-right .node-bubble::before {
      left: -12px;
      border-right-color: var(--bubble-border);
    }
    /* Left-side bubble: bubble is to the left of the node */
    .persona-node.bubble-left .node-bubble {
      right: calc(100% + 10px);
    }
    .persona-node.bubble-left .node-bubble::before {
      right: -12px;
      border-left-color: var(--bubble-border);
    }
    @keyframes bubbleFadeIn {
      from { opacity: 0; transform: translateY(-50%) scale(0.97); }
      to   { opacity: 1; transform: translateY(-50%) scale(1); }
    }
    .node-bubble .bubble-label {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .node-bubble .bubble-text {
      color: var(--text-muted);
    }
    .node-bubble .bubble-text p { margin: 0 0 0.35em; }
    .node-bubble .bubble-text p:last-child { margin-bottom: 0; }
    .node-bubble .bubble-text strong { font-weight: 700; }
    .node-bubble .bubble-text em { font-style: italic; }
    .node-bubble .bubble-text code { font-size: 0.85em; background: var(--panel-bg); padding: 0 3px; border-radius: 2px; }

    /* ── Round/status banner ── */
    .round-banner {
      display: none;
      width: 100%;
      max-width: 560px;
      border-radius: 5px;
      padding: 10px 16px;
      box-sizing: border-box;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: center;
      border: 1px solid;
    }
    .round-banner.visible { display: block; }
    .round-banner.deliberating {
      background: color-mix(in srgb, #f59e0b 10%, transparent);
      border-color: #f59e0b;
      color: #f59e0b;
    }
    .round-banner.done {
      background: color-mix(in srgb, var(--teal) 10%, transparent);
      border-color: var(--teal);
      color: var(--teal);
    }

    /* ── Topic display ── */
    .topic-display {
      display: none;
      width: 100%;
      max-width: 560px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-left: 3px solid var(--accent);
      border-radius: 4px;
      padding: 12px 16px;
      box-sizing: border-box;
    }
    .topic-display.visible { display: block; }
    .topic-display-label {
      font-size: 0.6rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .topic-display-text {
      font-size: 0.95rem;
      color: var(--text);
      line-height: 1.5;
      word-wrap: break-word;
      white-space: normal;
    }
    .topic-display-text:hover { color: var(--accent); }

    /* ── Debate feed ── */
    .debate-feed {
      display: none;
      width: 100%;
      max-width: 560px;
      flex-direction: column;
      gap: 0;
    }
    .debate-feed.visible { display: flex; }
    .feed-round-sep {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 0 10px;
      font-size: 0.62rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
    }
    .feed-round-sep::before,
    .feed-round-sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--card-border);
    }
    .feed-entry {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-left: 3px solid var(--fe-color, var(--card-border));
      border-radius: 5px;
      padding: 12px 14px;
      margin-bottom: 8px;
      animation: feedSlide 0.2s ease;
    }
    @keyframes feedSlide {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .feed-entry-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .feed-entry-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .feed-entry-emoji {
      font-size: 1.1rem;
      width: 28px;
      text-align: center;
      flex-shrink: 0;
    }
    .feed-entry-name {
      font-size: 0.75rem;
      font-weight: 700;
      flex: 1;
      min-width: 0;
    }
    .feed-entry-round-tag {
      font-size: 0.57rem;
      color: var(--text-muted);
      border: 1px solid var(--card-border);
      border-radius: 3px;
      padding: 1px 5px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }
    .feed-entry-round-tag.synthesis { color: var(--teal); border-color: var(--teal); }
    .feed-entry-model-badge {
      font-size: 0.5rem;
      padding: 1px 5px;
      border-radius: 3px;
      border: 1px solid var(--card-border);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    .feed-entry-body {
      font-size: 0.75rem;
      line-height: 1.65;
      color: var(--text-muted);
    }
    .feed-entry-body p { margin: 0 0 0.4em; }
    .feed-entry-body p:last-child { margin-bottom: 0; }
    .feed-entry-body strong { font-weight: 700; color: var(--text); }
    .feed-entry-body em { font-style: italic; }
    .feed-entry-body code { font-size: 0.85em; background: var(--panel-bg); padding: 0 3px; border-radius: 2px; }
    .feed-entry.synthesis-entry {
      border-color: color-mix(in srgb, var(--teal) 40%, transparent);
      background: color-mix(in srgb, var(--teal) 4%, var(--card-bg));
    }
    .feed-loading {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    /* ── Verdict card ── */
    .verdict-card {
      display: none;
      width: 100%;
      max-width: 560px;
      background: color-mix(in srgb, var(--teal) 5%, var(--card-bg));
      border: 2px solid var(--teal);
      border-radius: 6px;
      padding: 18px 20px;
      box-sizing: border-box;
    }
    .verdict-card.visible { display: block; }
    .verdict-card-heading {
      font-size: 1rem;
      font-weight: 700;
      color: var(--teal);
      text-shadow: 0 0 10px rgba(78,204,163,0.4);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .verdict-card-text {
      font-size: 0.78rem;
      line-height: 1.7;
      color: var(--text);
      border-left: 2px solid var(--teal);
      padding-left: 12px;
      margin-bottom: 14px;
    }
    .verdict-card-text p { margin: 0 0 0.5em; }
    .verdict-card-text p:last-child { margin-bottom: 0; }
    .verdict-card-text strong { font-weight: 700; }
    .verdict-card-text em { font-style: italic; }
    .verdict-card-text code { font-size: 0.85em; background: var(--panel-bg); padding: 0 3px; border-radius: 2px; }
    .verdict-evolution {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid color-mix(in srgb, var(--teal) 25%, transparent);
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .verdict-evolution-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .verdict-evolution-item {
      font-size: 0.7rem;
      color: var(--text-muted);
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .verdict-evolution-item .evo-badge {
      font-size: 0.58rem;
      padding: 1px 5px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
      flex-shrink: 0;
    }
    .evo-badge.EVOLVE { background: color-mix(in srgb, var(--teal) 20%, transparent); color: var(--teal); border: 1px solid var(--teal); }
    .evo-badge.FIRE { background: color-mix(in srgb, var(--accent) 20%, transparent); color: var(--accent); border: 1px solid var(--accent); }
    .evo-badge.RETAIN { background: var(--card-bg); color: var(--text-muted); border: 1px solid var(--card-border); }
    .verdict-session-link {
      margin-top: 10px;
      font-size: 0.65rem;
      color: var(--text-muted);
    }
    .verdict-session-link a { color: var(--teal); text-decoration: none; }
    .verdict-session-link a:hover { text-decoration: underline; }

    /* ── Model badge on persona nodes ── */
    .node-model-badge {
      font-size: 0.38rem;
      padding: 1px 4px;
      border-radius: 2px;
      border: 1px solid var(--node-border-idle);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 1px;
    }
    .persona-node.active .node-model-badge { border-color: var(--accent); color: var(--accent); }
    .persona-node.done .node-model-badge { border-color: var(--teal); color: var(--teal); }

    /* ── Topic modal ── */
    .topic-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 400;
      align-items: center;
      justify-content: center;
    }
    .topic-modal-overlay.open { display: flex; }
    .topic-modal {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 6px;
      padding: 22px 24px;
      max-width: 540px;
      width: 92%;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
    }
    .topic-modal-close {
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: 1px solid transparent;
      color: var(--text-muted);
      font-size: 1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'JetBrains Mono', monospace;
      transition: color 0.12s, border-color 0.12s;
    }
    .topic-modal-close:hover { color: var(--accent); border-color: var(--accent); }
    .topic-modal-label {
      font-size: 0.6rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }
    .topic-modal-text {
      font-size: 0.82rem;
      line-height: 1.65;
      color: var(--text);
    }

    /* ── Center task — clickable hint ── */
    .center-label .task-preview {
      cursor: pointer;
      text-decoration: underline;
      text-decoration-color: color-mix(in srgb, var(--text-muted) 40%, transparent);
      text-underline-offset: 2px;
      transition: color 0.12s;
    }
    .center-label .task-preview:hover { color: var(--accent); }
    .review-synthesis p { margin: 0 0 0.5em; }
    .review-synthesis p:last-child { margin-bottom: 0; }
    .review-synthesis strong { font-weight: 700; }
    .review-synthesis em { font-style: italic; }
    .review-synthesis code { font-size: 0.85em; background: var(--panel-bg); padding: 0 3px; border-radius: 2px; }
    .dot-pulse-inline {
      display: inline-flex;
      gap: 3px;
      align-items: center;
    }
    .dot-pulse-inline span {
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: dotpulse 1.2s infinite;
    }
    .dot-pulse-inline span:nth-child(2) { animation-delay: 0.2s; }
    .dot-pulse-inline span:nth-child(3) { animation-delay: 0.4s; }

    /* Streaming inference animation */
    .node-bubble.streaming .bubble-text::after {
      content: '▋';
      animation: blink 0.8s step-end infinite;
      color: var(--accent);
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .node-bubble.streaming {
      border-color: var(--accent);
      box-shadow: 0 0 8px color-mix(in srgb, var(--accent) 30%, transparent);
    }

    /* ── Streaming feed placeholder ── */
    .feed-entry.streaming-placeholder {
      opacity: 0.88;
    }
    .feed-entry.streaming-placeholder .feed-entry-body {
      white-space: pre-wrap;
      word-break: break-word;
    }
    .streaming-cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      vertical-align: text-bottom;
      margin-left: 1px;
      animation: blink 0.8s step-end infinite;
    }

    /* ── Ibrahim thinking pulse ── */
    @keyframes ibrahim-pulse {
      0%, 100% { opacity: 0.7; box-shadow: 0 0 16px color-mix(in srgb, var(--accent) 20%, transparent); }
      50% { opacity: 1; box-shadow: 0 0 30px color-mix(in srgb, var(--accent) 50%, transparent), 0 0 55px color-mix(in srgb, var(--accent) 20%, transparent); }
    }
    .center-label.thinking {
      animation: ibrahim-pulse 1.5s ease-in-out infinite;
    }
    .center-label.thinking .mod-name {
      color: #f59e0b;
      text-shadow: 0 0 8px #f59e0b;
    }
  </style>
</head>
<body>

<!-- Reinstate modal -->
<div class="modal-overlay" id="reinstateModal">
  <div class="modal">
    <h3 id="modalTitle">Reinstate</h3>
    <p id="modalBody">Choose which seat to displace:</p>
    <div class="modal-seats" id="modalSeats"></div>
    <button class="btn-cancel" onclick="closeModal()">cancel</button>
  </div>
</div>

<!-- Topic modal -->
<div class="topic-modal-overlay" id="topicModal">
  <div class="topic-modal">
    <button class="topic-modal-close" id="topicModalClose">✕</button>
    <div class="topic-modal-label">topic</div>
    <div class="topic-modal-text" id="topicModalText"></div>
  </div>
</div>

<div class="congress-layout">

  <!-- LEFT: Sessions + Roster -->
  <aside class="sidebar sidebar-left">
    <div class="sidebar-header">
      <h2>Sessions</h2>
    </div>
    <div class="sidebar-body" id="sidebarSessionList" style="flex: 0 1 auto; max-height: 45%; min-height: 80px;">
      <div class="session-list-empty">Loading…</div>
    </div>
    <div class="sidebar-section-divider">
      Roster <span class="count-badge" id="rosterCount" style="font-size:0.55rem; color: var(--text-muted); margin-left:4px;">0 / 5</span>
    </div>
    <div class="sidebar-body" id="rosterList" style="flex: 1;"></div>
  </aside>

  <!-- CENTER: Arena -->
  <div class="arena-col">
    <!-- Session hint banner (shown when viewing a session) -->
    <div class="session-hint" id="sessionHint"></div>

    <div class="page-header">
      <h1>congress<span class="session-badge" id="sessionBadge" style="display:none"></span></h1>
      <div class="subtitle">AI parliament — personas deliberate, vote, decide</div>
    </div>

    <!-- Topic display (prominent, shown when in session view) -->
    <div class="topic-display" id="topicDisplay">
      <div class="topic-display-label">Topic</div>
      <div class="topic-display-text" id="topicDisplayText" title="Click to see full topic"></div>
    </div>

    <!-- Round/status banner -->
    <div class="round-banner" id="roundBanner"></div>

    <div class="arena" id="arena">
      <div class="center-label" id="centerLabel">
        <span class="mod-emoji">⚖️</span>
        <span class="mod-name">Ibrahim</span>
        <span class="mod-role">moderator</span>
        <span class="mod-deliberating" id="centerDeliberating">deliberating…</span>
        <div class="task-preview" id="centerTask" style="display:none"></div>
      </div>
    </div>

    <div class="status-line" id="statusLine">loading roster…</div>

    <!-- Session list (shown when no session in URL) -->
    <div class="session-list-panel" id="sessionListPanel" style="display:none">
      <h2>Congress Sessions</h2>
      <div id="sessionListBody"><div class="session-list-empty">Loading sessions…</div></div>
    </div>

    <!-- Debate feed (shown when in session view) -->
    <div class="debate-feed" id="debateFeed"></div>

    <!-- Verdict card (shown when session.status === 'done') -->
    <div class="verdict-card" id="verdictCard">
      <div class="verdict-card-heading">⚖️ Verdict</div>
      <div class="verdict-card-text" id="verdictCardText"></div>
      <div class="verdict-evolution" id="verdictEvolution" style="display:none"></div>
      <div class="verdict-session-link" id="verdictSessionLink"></div>
    </div>

    <!-- Legacy review bar (keep for compat, hidden by default) -->
    <div class="review-bar" id="reviewBar" style="display:none">
      <div class="review-label">HIRING MANAGER — synthesis</div>
      <div class="review-synthesis" id="reviewSynthesis"></div>
    </div>
  </div>

  <!-- RIGHT: Severance -->
  <aside class="sidebar sidebar-right">
    <div class="sidebar-header">
      <h2>Severance</h2>
    </div>
    <div class="sidebar-body" id="severanceList"></div>
  </aside>

</div>

<script>
(function () {
  'use strict';

  // ── Constants ──────────────────────────────────────────────────────────────
  const SEAT_COUNT = 5;
  // Evenly-spaced angles for 5 seats starting from top (270°), clockwise
  // 270, 342, 54, 126, 198
  const NODE_ANGLES_DEG = [270, 342, 54, 126, 198];
  // Which side the speech bubble appears on for each seat (right or left)
  // seats on the right half (270°, 342°, 54°) → right; seats on the left half (126°, 198°) → left
  const BUBBLE_SIDE = ['right', 'right', 'right', 'left', 'left'];

  // Emoji & color defaults (server also provides these, used as fallback)
  const EMOJI_MAP = { critic: '🔍', architect: '🏗️', ux: '🎨', 'hiring-manager': '⚖️', otto: '🌪️', spengler: '🕰️' };
  const COLOR_MAP = { architect: '#f59e0b', critic: '#f87171', ux: '#60a5fa', otto: '#a78bfa', spengler: '#94a3b8' };

  // ── State ──────────────────────────────────────────────────────────────────
  let seats = [null, null, null, null, null];   // persona | null for each seat
  let firedPool = [];                // personas in severance
  let pendingReinstate = null;       // persona waiting for seat selection
  let round = 0;
  let currentSessionId = null;       // active session id (from URL or newly started)
  let sessionPollTimer = null;
  let streamingEventSource = null;
  let streamingSessionId = null;
  let streamingPlaceholderIdentity = null;  // identity currently streaming in feed
  let streamingPlaceholderText = '';         // accumulated text for feed placeholder
  let lastRenderedRound = 0;                 // track round transitions for bubble clearing

  // ── Boot ───────────────────────────────────────────────────────────────────
  async function init() {
    // Check URL for session param
    const urlParams = new URLSearchParams(window.location.search);
    const sessionParam = urlParams.get('session');

    // Load identities for circle rendering
    try {
      const res = await fetch('/api/agents');
      if (res.status === 401) {
        window.location.href = 'https://terminal.clung.us/auth/github?next=' + encodeURIComponent(window.location.href);
        return;
      }
      if (!res.ok) throw new Error('status ' + res.status);
      const data = await res.json();
      // Use all active personas (up to SEAT_COUNT), filtering out hiring-manager (center)
      const active = (data.active || []).filter(p => !p.is_moderator).slice(0, SEAT_COUNT);
      for (let i = 0; i < SEAT_COUNT; i++) seats[i] = active[i] || null;
      firedPool = data.fired || [];
    } catch (e) {
      console.warn('[congress] /api/agents failed, trying fallback:', e);
      // Fallback: load from /api/congress/identities
      try {
        const res = await fetch('/api/congress/identities');
        if (res.ok) {
          const ids = await res.json();
          const debaters = ids.filter(i => i.name !== 'hiring-manager').slice(0, SEAT_COUNT);
          for (let i = 0; i < SEAT_COUNT; i++) {
            const d = debaters[i];
            if (d) seats[i] = {
              id: d.name, name: d.name,
              display_name: d.display_name || '',
              avatar_url: d.avatar_url || '',
              emoji: EMOJI_MAP[d.name] || '🤖',
              color: COLOR_MAP[d.name] || '#888',
              description: d.role || '',
            };
          }
          firedPool = [];
        }
      } catch (e2) { /* ignore */ }
    }

    // Always load sessions into the left sidebar
    loadSidebarSessionList(sessionParam);

    if (sessionParam && /^congress-\d+$/.test(sessionParam)) {
      // ── Session view ──
      currentSessionId = sessionParam;
      applySessionBadge(sessionParam);
      showSessionHint(sessionParam);
      render();
      setStatus('loading session…');
      await loadSessionIntoPage(sessionParam);
    } else {
      // ── Default view: no session selected ──
      render();
      setStatus('select a session from the sidebar');
      document.querySelector('.page-header .subtitle').textContent = 'select a session to replay';
    }
  }

  function showSessionHint(sessionParam) {
    const m = sessionParam.match(/^congress-(\d+)$/);
    const num = m ? parseInt(m[1], 10) : '?';
    const hint = document.getElementById('sessionHint');
    hint.style.display = '';
    hint.innerHTML = '<strong>Session #' + num + '</strong> — use <code>[congress] &lt;topic&gt;</code> in Discord to start a new session';
  }

  function applySessionBadge(sessionId) {
    const badge = document.getElementById('sessionBadge');
    const m = sessionId.match(/^congress-(\d+)$/);
    if (m) {
      badge.textContent = '#' + parseInt(m[1], 10);
      badge.style.display = '';
    }
  }

  async function loadSessionIntoPage(sessionId) {
    try {
      const res = await fetch('/api/congress/sessions/' + sessionId);
      if (!res.ok) {
        setStatus('session not found: ' + sessionId);
        return;
      }
      const session = await res.json();
      // Show topic in the prominent topic display bar above the arena
      if (session.topic) {
        fullTopicText = session.topic;
        // Topic display bar — always show full topic, word-wrapped
        const topicDisplay = document.getElementById('topicDisplay');
        const topicText = document.getElementById('topicDisplayText');
        topicText.textContent = session.topic;
        topicDisplay.classList.add('visible');
      }

      renderSessionStatus(sessionId, session.status);
      renderRoundBanner(session);
      applySessionData(session, true);

      if (session.status === 'deliberating') {
        startSessionPolling(sessionId);
        if (streamingSessionId !== sessionId) {
          startStreaming(sessionId);
        }
      } else if (session.status === 'done' || session.status === 'complete') {
        stopStreaming();
      }
    } catch (e) {
      setStatus('could not load session: ' + e.message);
    }
  }

  function applySessionData(session, deferred) {
    if (session.rounds && session.rounds.length > 0) {
      const lastRoundsByIdentity = {};
      session.rounds.forEach(r => { lastRoundsByIdentity[r.identity] = r.response; });

      // Detect round transitions — clear bubbles when moving to a new round
      const debaterCount = seats.filter(Boolean).length || 3;
      const debateEntries = session.rounds.filter(r => r.identity !== 'hiring-manager');
      const currentRound = debateEntries.length > 0
        ? Math.floor((debateEntries.length - 1) / debaterCount) + 1
        : 0;
      if (currentRound > lastRenderedRound && lastRenderedRound > 0) {
        // Transitioning to a new round — clear all bubble text
        for (let i = 0; i < SEAT_COUNT; i++) {
          const bubbleEl = document.getElementById('bubble-seat-' + i);
          if (bubbleEl && !bubbleEl.classList.contains('streaming')) {
            bubbleEl.classList.remove('visible');
            const textEl = bubbleEl.querySelector('.bubble-text');
            if (textEl) textEl.innerHTML = '';
          }
        }
      }
      lastRenderedRound = currentRound;

      const applyRounds = () => {
        seats.forEach((p, i) => {
          if (p && lastRoundsByIdentity[p.id]) {
            setNodeState(i, 'done');
            // If streaming is active for this session, let SSE drive bubble text;
            // only overwrite via polling when streaming is inactive or finished.
            const bubbleEl = document.getElementById('bubble-seat-' + i);
            const isStreaming = bubbleEl && bubbleEl.classList.contains('streaming');
            if (!isStreaming) {
              setBubbleText(i, p.display_name || p.name, lastRoundsByIdentity[p.id]);
            }
          }
        });
      };
      if (deferred) setTimeout(applyRounds, 300); else applyRounds();
      // Render debate feed
      renderDebateFeed(session);
    }
    if (session.synthesis) {
      document.getElementById('reviewSynthesis').innerHTML = renderMarkdown(session.synthesis);
      document.getElementById('reviewBar').classList.add('visible');
    }
    // Render verdict card
    if (session.status === 'done' && session.verdict) {
      renderVerdictCard(session);
    }
  }

  function renderSessionStatus(sessionId, status) {
    const st = status || 'unknown';
    const statusLine = document.getElementById('statusLine');
    const dot = document.createElement('span');
    dot.className = 'status-dot ' + st;
    statusLine.innerHTML = '';
    statusLine.appendChild(dot);
    statusLine.appendChild(document.createTextNode(sessionId + ' — ' + st));
  }

  function setCenterDeliberating(active) {
    const cl = document.getElementById('centerLabel');
    if (!cl) return;
    if (active) {
      cl.classList.add('deliberating-active');
    } else {
      cl.classList.remove('deliberating-active');
    }
  }

  function startSessionPolling(sessionId) {
    setCenterDeliberating(true);
    if (sessionPollTimer) clearInterval(sessionPollTimer);
    sessionPollTimer = setInterval(async () => {
      try {
        const res = await fetch('/api/congress/sessions/' + sessionId);
        if (!res.ok) return;
        const session = await res.json();
        renderSessionStatus(sessionId, session.status);
        renderRoundBanner(session);
        if (session.status !== 'deliberating') {
          clearInterval(sessionPollTimer);
          sessionPollTimer = null;
          setCenterDeliberating(false);
          stopStreaming();
        }
        applySessionData(session, false);
      } catch (e) {
        // Ignore polling errors
      }
    }, 4000);
  }

  async function loadSidebarSessionList(selectedId) {
    const container = document.getElementById('sidebarSessionList');
    try {
      const res = await fetch('/api/congress/sessions');
      if (!res.ok) throw new Error('status ' + res.status);
      let sessions = await res.json();
      container.innerHTML = '';
      if (sessions.length === 0) {
        container.innerHTML = '<div class="session-list-empty">No sessions yet.</div>';
        return;
      }
      // Sort: deliberating first, then by session number descending
      sessions = sessions.slice().sort((a, b) => {
        const aActive = a.status === 'deliberating' ? 0 : 1;
        const bActive = b.status === 'deliberating' ? 0 : 1;
        if (aActive !== bActive) return aActive - bActive;
        return (b.session_number || 0) - (a.session_number || 0);
      });
      sessions.forEach(s => {
        const a = document.createElement('a');
        const isSelected = selectedId && s.session_id === selectedId;
        const isDeliberating = s.status === 'deliberating';
        a.className = 'sidebar-session-item' +
          (isSelected ? ' selected' : '') +
          (isDeliberating ? ' deliberating' : '');
        a.href = '/congress?session=' + s.session_id;

        const numEl = document.createElement('span');
        numEl.className = 'sidebar-session-num';
        numEl.textContent = '#' + s.session_number;

        const topicEl = document.createElement('span');
        topicEl.className = 'sidebar-session-topic';
        const shortTopic = (s.topic || '(no topic)');
        topicEl.textContent = shortTopic.length > 32 ? shortTopic.slice(0, 30) + '…' : shortTopic;
        topicEl.title = s.topic || '';

        const dotEl = document.createElement('span');
        dotEl.className = 'status-dot ' + (s.status || '');

        a.appendChild(numEl);
        a.appendChild(topicEl);
        a.appendChild(dotEl);
        container.appendChild(a);
      });
    } catch (e) {
      container.innerHTML = '<div class="session-list-empty">Could not load sessions.</div>';
    }
  }

  async function loadSessionList() {
    const body = document.getElementById('sessionListBody');
    try {
      const res = await fetch('/api/congress/sessions');
      if (!res.ok) throw new Error('status ' + res.status);
      let sessions = await res.json();
      body.innerHTML = '';
      if (sessions.length === 0) {
        body.innerHTML = '<div class="session-list-empty">No sessions yet. Use <code>[congress] &lt;topic&gt;</code> in Discord to start one.</div>';
        return;
      }
      // Sort: in-progress (deliberating) first, then by session number descending
      sessions = sessions.slice().sort((a, b) => {
        const aActive = a.status === 'deliberating' ? 0 : 1;
        const bActive = b.status === 'deliberating' ? 0 : 1;
        if (aActive !== bActive) return aActive - bActive;
        return (b.session_number || 0) - (a.session_number || 0);
      });
      sessions.forEach(s => {
        const a = document.createElement('a');
        a.className = 'session-item';
        a.href = '/congress?session=' + s.session_id;
        const numEl = document.createElement('div');
        numEl.className = 'session-item-num';
        numEl.textContent = '#' + s.session_number;
        const bodyEl = document.createElement('div');
        bodyEl.className = 'session-item-body';
        const topic = document.createElement('div');
        topic.className = 'session-item-topic';
        topic.textContent = s.topic || '(no topic)';

        statusEl.appendChild(document.createTextNode(st));

        a.appendChild(bodyEl);
        a.appendChild(statusEl);

  // ── Rendering ──────────────────────────────────────────────────────────────
  function render() {
    renderRoster();
    renderCircle();
    renderSeverance();
  }

  function renderRoster() {
    const list = document.getElementById('rosterList');
    list.innerHTML = '';
    const count = seats.filter(Boolean).length;
    document.getElementById('rosterCount').textContent = count + ' / ' + SEAT_COUNT;

    for (let i = 0; i < SEAT_COUNT; i++) {
      const p = seats[i];
      const card = document.createElement('div');
      card.className = 'seat-card ' + (p ? 'occupied' : 'empty');
      if (p && p.color) card.style.setProperty('--sc', p.color);

      const num = document.createElement('span');
      num.className = 'seat-num';
      num.textContent = 'seat ' + (i + 1);
      card.appendChild(num);

      if (p && p.avatar_url) {
        const avatar = document.createElement('img');
        avatar.className = 'seat-avatar';
        avatar.src = p.avatar_url;
        avatar.alt = p.display_name || p.name;
        card.appendChild(avatar);
      } else {
        const emoji = document.createElement('span');
        emoji.className = 'seat-emoji';
        emoji.textContent = p ? (p.emoji || '🤖') : '○';
        card.appendChild(emoji);
      }

      const info = document.createElement('div');
      info.className = 'seat-info';
      const name = document.createElement('div');
      name.className = 'seat-name';
      if (p) {
        name.textContent = p.display_name || p.name;
      } else {
        name.textContent = 'empty seat';
        name.style.color = 'var(--text-muted)';
        name.style.fontStyle = 'italic';
      }
      info.appendChild(name);
      if (p) {
        const desc = document.createElement('div');
        desc.className = 'seat-desc';
        desc.textContent = p.title || p.description || p.role || '';
        info.appendChild(desc);
      }
      card.appendChild(info);

      if (p) {
        const btn = document.createElement('button');
        btn.className = 'btn-remove';
        btn.textContent = '✕';
        btn.title = 'Move to severance';
        btn.addEventListener('click', () => removeToSeverance(i));
        card.appendChild(btn);
      }

      list.appendChild(card);
    }
  }

  function renderCircle() {
    const arena = document.getElementById('arena');
    arena.querySelectorAll('.persona-node').forEach(el => el.remove());

    const W = arena.offsetWidth || 440;
    const H = arena.offsetHeight || 440;
    const cx = W / 2;
    const cy = H / 2;
    const r = Math.min(W, H) * 0.365;

    for (let i = 0; i < SEAT_COUNT; i++) {
      const deg = NODE_ANGLES_DEG[i];
      const rad = (deg * Math.PI) / 180;
      const nx = cx + r * Math.cos(rad);
      const ny = cy + r * Math.sin(rad);
      const p = seats[i];

      const node = document.createElement('div');
      node.className = 'persona-node' + (p ? '' : ' empty-node');
      node.id = 'node-seat-' + i;
      node.style.left = nx + 'px';
      node.style.top = ny + 'px';
      const avatarHtml = p && p.avatar_url
        ? `<img class="node-avatar" src="${p.avatar_url}" alt="${p.display_name || p.name}" />`
        : `<div class="node-emoji">${p ? (p.emoji || '🤖') : '○'}</div>`;
      const modelLabel = p ? (p.model ? p.model.charAt(0).toUpperCase() + p.model.slice(1) : 'Claude') : '';
      const modelBadge = p ? `<div class="node-model-badge">${modelLabel}</div>` : '';
      const titleHtml = p && p.title ? `<div class="node-title">${p.title}</div>` : '';
      const displayNameHtml = p
        ? `<div class="node-display-name">${p.display_name || p.name}</div>${titleHtml}${modelBadge}`
        : '';
      const side = BUBBLE_SIDE[i] || 'right';
      node.classList.add('bubble-' + side);
      node.innerHTML = `<div class="node-circle">${avatarHtml}${displayNameHtml}</div>` +
        `<div class="node-bubble" id="bubble-seat-${i}"><div class="bubble-label"></div><div class="bubble-text"></div></div>`;
      arena.appendChild(node);
    }
  }

    list.innerHTML = '';

    if (firedPool.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'sidebar-empty';
      empty.textContent = 'No one in severance.';
      list.appendChild(empty);
      return;
    }

    firedPool.forEach(p => {
      const card = document.createElement('div');
      card.className = 'fired-card';
      if (p.color) card.style.setProperty('--sc', p.color);

      if (p.avatar_url) {
        const avatar = document.createElement('img');
        avatar.className = 'seat-avatar';
        avatar.src = p.avatar_url;
        avatar.alt = p.display_name || p.name;
        card.appendChild(avatar);
      } else {
        const emoji = document.createElement('span');
        emoji.className = 'seat-emoji';
        emoji.textContent = p.emoji || '🤖';
        card.appendChild(emoji);
      }

      const info = document.createElement('div');
      info.className = 'seat-info';
      const name = document.createElement('div');
      name.className = 'seat-name';
      name.textContent = p.display_name || p.name;
      info.appendChild(name);
      if (p.title || p.role) {

        desc.className = 'seat-desc';

  // ── Roster actions ─────────────────────────────────────────────────────────
  function removeToSeverance(seatIndex) {
    const p = seats[seatIndex];
    if (!p) return;
    seats[seatIndex] = null;
    const entry = Object.assign({}, p);
    if (!entry.fired_reason) entry.fired_reason = 'Removed from active roster.';
    firedPool.unshift(entry);
    render();
    setStatus((p.display_name || p.name) + ' moved to severance');
  }

  function openReinstateModal(persona) {
    pendingReinstate = persona;
    document.getElementById('modalTitle').textContent = 'Reinstate ' + (persona.display_name || persona.name);
    document.getElementById('modalBody').textContent = 'Choose a seat to place them in:';

    const seatsEl = document.getElementById('modalSeats');
    seatsEl.innerHTML = '';

    for (let i = 0; i < SEAT_COUNT; i++) {
      const s = seats[i];
      const btn = document.createElement('button');
      btn.className = 'modal-seat-btn' + (s ? '' : ' empty-slot');

      btn.innerHTML = `<span class="slot-emoji">${s ? (s.emoji || '🤖') : '○'}</span>
        <div class="slot-info">
          <div class="slot-name">${s ? (s.display_name || s.name) : 'empty seat'}</div>
          <div class="slot-num">seat ${i + 1}</div>
        </div>`;
      btn.addEventListener('click', () => doReinstate(i));
      seatsEl.appendChild(btn);
    }

    document.getElementById('reinstateModal').classList.add('open');
  }

  function doReinstate(seatIndex) {
    if (!pendingReinstate) return;
    const displaced = seats[seatIndex];
    const reinstated = Object.assign({}, pendingReinstate);
    delete reinstated.fired_reason;

    seats[seatIndex] = reinstated;
    firedPool = firedPool.filter(p => p.id !== pendingReinstate.id);

    if (displaced) {
      const d = Object.assign({}, displaced);
      if (!d.fired_reason) d.fired_reason = 'Displaced by ' + (reinstated.display_name || reinstated.name) + '.';
      firedPool.unshift(d);
    }

    const rname = reinstated.display_name || reinstated.name;
    pendingReinstate = null;
    closeModal();
    render();
    setStatus(rname + ' reinstated to seat ' + (seatIndex + 1));
  }

  window.closeModal = function () {
    pendingReinstate = null;
    document.getElementById('reinstateModal').classList.remove('open');
  };
  document.getElementById('reinstateModal').addEventListener('click', function (e) {
    if (e.target === this) closeModal();
  });

  // ── Circle node state helpers ──────────────────────────────────────────────
  function setNodeState(seatIndex, state) {
    const node = document.getElementById('node-seat-' + seatIndex);
    if (node) {
      node.classList.remove('active', 'done');
      if (state) node.classList.add(state);
    }
  }

  // ── Speech bubble helpers ─────────────────────────────────────────────────────
  function getNodeBubble(seatIndex) {
    // Try to find the bubble; it may not exist yet if renderCircle hasn't run
    return document.getElementById('bubble-seat-' + seatIndex);
  }

  function showBubbleLoading(seatIndex, label) {
    const bubble = getNodeBubble(seatIndex);
    if (!bubble) return;
    const p = seats[seatIndex];
    const color = (p && p.color) ? p.color : 'var(--accent)';
    bubble.querySelector('.bubble-label').textContent = label || '';
    bubble.querySelector('.bubble-label').style.color = color;
    bubble.querySelector('.bubble-text').innerHTML =
      '<div class="dot-pulse-inline"><span></span><span></span><span></span></div>';
    bubble.classList.add('visible');
  }

  function renderMarkdown(text) {
    if (!text) return '';
    // Escape HTML first to prevent injection
    let html = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    // Headers → bold
    html = html.replace(/^#{1,3}\s+(.+)$/gm, '<strong>$1</strong>');
    // Bold
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // Inline code
    html = html.replace(/`(.+?)`/g, '<code>$1</code>');
    // Paragraphs: split on double newline
    const parts = html.split(/\n\n+/);
    return parts.map(p => '<p>' + p.replace(/\n/g, '<br>') + '</p>').join('');
  }

  function setBubbleText(seatIndex, label, text) {
    const bubble = getNodeBubble(seatIndex);
    if (!bubble) return;
    const p = seats[seatIndex];
    const color = (p && p.color) ? p.color : 'var(--accent)';
    bubble.querySelector('.bubble-label').textContent = label || '';
    bubble.querySelector('.bubble-label').style.color = color;
    bubble.querySelector('.bubble-text').innerHTML = renderMarkdown(text);
    bubble.classList.add('visible');
  }

  function startStreaming(sessionId) {
    if (streamingEventSource) {
      streamingEventSource.close();
    }
    streamingSessionId = sessionId;
    const es = new EventSource('/api/congress/stream?session_id=' + sessionId);
    streamingEventSource = es;

    es.onmessage = function(e) {
      const data = JSON.parse(e.data);
      const identity = data.identity;
      const chunk = data.text;
      const done = data.done;

      // Find the seat for this identity
      const seatIdx = seats.findIndex(s => s && (s.name === identity || s.id === identity || s.display_name === identity));
      if (seatIdx === -1) return;

      const bubbleEl = document.getElementById('bubble-seat-' + seatIdx);
      if (!bubbleEl) return;
      const textEl = bubbleEl.querySelector('.bubble-text');
      const labelEl = bubbleEl.querySelector('.bubble-label');

      const p = seats[seatIdx];
      const isIbrahim = identity === 'hiring-manager';

      if (!done && chunk) {
        // Show streaming text in bubble
        bubbleEl.classList.add('active', 'streaming', 'visible');
        if (labelEl) {
          labelEl.textContent = (p && (p.display_name || p.name)) || identity;
          if (p && p.color) labelEl.style.color = p.color;
        }
        if (textEl) {
          textEl.textContent += chunk;
          textEl.dataset.streaming = 'true';
        }

        // Ibrahim thinking state on center node
        if (isIbrahim) {
          const cl = document.getElementById('centerLabel');
          if (cl) cl.classList.add('thinking');
        }

        // Update feed placeholder
        updateStreamingFeedPlaceholder(identity, p, chunk, false);

      } else if (done) {
        // Streaming complete for this persona
        if (textEl) delete textEl.dataset.streaming;
        bubbleEl.classList.remove('streaming');

        // Clear Ibrahim thinking state
        if (isIbrahim) {
          const cl = document.getElementById('centerLabel');
          if (cl) cl.classList.remove('thinking');
        }

        // Remove feed placeholder (real entry will come in via polling)
        if (streamingPlaceholderIdentity === identity) {
          removeStreamingFeedPlaceholder();
        }
      }
    };

    es.onerror = function() {
      es.close();
      streamingEventSource = null;
    };
  }

  function stopStreaming() {
    if (streamingEventSource) {
      streamingEventSource.close();
      streamingEventSource = null;
    }
    streamingSessionId = null;
    // Clear any lingering thinking/placeholder state
    const cl = document.getElementById('centerLabel');
    if (cl) cl.classList.remove('thinking');
    removeStreamingFeedPlaceholder();
  }

  // ── Streaming feed placeholder helpers ────────────────────────────────────
  function updateStreamingFeedPlaceholder(identity, persona, chunk, done) {
    const feed = document.getElementById('debateFeed');
    if (!feed || !feed.classList.contains('visible')) return;

    // If this is a new persona streaming, reset accumulator and swap placeholder
    if (streamingPlaceholderIdentity !== identity) {
      removeStreamingFeedPlaceholder();
      streamingPlaceholderIdentity = identity;
      streamingPlaceholderText = '';
    }

    streamingPlaceholderText += chunk;

    // Find or create placeholder
    let placeholder = feed.querySelector('.streaming-placeholder');
    if (!placeholder) {
      placeholder = buildStreamingPlaceholder(identity, persona);
      feed.appendChild(placeholder);
    }

    // Update body text (plain text, no markdown yet — it's streaming)
    const bodyEl = placeholder.querySelector('.feed-entry-body');
    if (bodyEl) {
      bodyEl.textContent = streamingPlaceholderText;
      // Append blinking cursor span
      const cursor = document.createElement('span');
      cursor.className = 'streaming-cursor';
      bodyEl.appendChild(cursor);
    }

    // Scroll feed to bottom
    feed.scrollTop = feed.scrollHeight;
  }

  function removeStreamingFeedPlaceholder() {
    const feed = document.getElementById('debateFeed');
    if (!feed) return;
    const placeholder = feed.querySelector('.streaming-placeholder');
    if (placeholder) placeholder.remove();
    streamingPlaceholderIdentity = null;
    streamingPlaceholderText = '';
  }

  function buildStreamingPlaceholder(identity, persona) {
    const isSynthesis = identity === 'hiring-manager';
    const div = document.createElement('div');
    div.className = 'feed-entry streaming-placeholder' + (isSynthesis ? ' synthesis-entry' : '');

    const headerColor = persona && persona.color ? persona.color : (isSynthesis ? 'var(--teal)' : 'var(--text-muted)');
    if (persona && persona.color) {
      div.style.setProperty('--fe-color', persona.color);
    } else if (isSynthesis) {
      div.style.setProperty('--fe-color', 'var(--teal)');
    }

    const header = document.createElement('div');
    header.className = 'feed-entry-header';

    if (persona && persona.avatar_url) {
      const img = document.createElement('img');
      img.className = 'feed-entry-avatar';
      img.src = persona.avatar_url;
      img.alt = persona.display_name || persona.name;
      header.appendChild(img);
    } else {
      const emoji = document.createElement('div');
      emoji.className = 'feed-entry-emoji';
      emoji.textContent = persona ? (persona.emoji || '🤖') : (isSynthesis ? '⚖️' : '🤖');
      header.appendChild(emoji);
    }

    const nameEl = document.createElement('div');
    nameEl.className = 'feed-entry-name';
    nameEl.style.color = headerColor;
    nameEl.textContent = persona ? (persona.display_name || persona.name) : (isSynthesis ? 'Ibrahim the Immovable' : identity);
    header.appendChild(nameEl);

    const tag = document.createElement('div');
    tag.className = 'feed-entry-round-tag' + (isSynthesis ? ' synthesis' : '');
    tag.textContent = isSynthesis ? 'synthesis' : 'generating…';
    header.appendChild(tag);

    div.appendChild(header);

    const body = document.createElement('div');
    body.className = 'feed-entry-body';
    div.appendChild(body);

    return div;
  }

  function setStatus(msg) {
    document.getElementById('statusLine').textContent = msg;
  }

  // ── Round banner ──────────────────────────────────────────────────────────
  function renderRoundBanner(session) {
    const banner = document.getElementById('roundBanner');
    if (!banner) return;
    const rounds = session.rounds || [];
    const debaterCount = seats.filter(Boolean).length || 3;
    const status = session.status || 'deliberating';

    let text = '';
    let cls = 'deliberating';

    if (status === 'done') {
      text = '⚖️ Adjourned — deliberation complete';
      cls = 'done';
    } else if (rounds.length === 0) {
      text = '⏳ Waiting for Round 1: Initial Positions';
      cls = 'deliberating';
    } else {
      // Count non-hiring-manager rounds to determine which round we're in
      const debateEntries = rounds.filter(r => r.identity !== 'hiring-manager');
      const synthesisEntries = rounds.filter(r => r.identity === 'hiring-manager');
      if (synthesisEntries.length > 0) {
        text = '⚖️ Synthesis — hiring manager deliberating';
        cls = 'deliberating';
      } else {
        const roundNum = Math.floor((debateEntries.length - 1) / debaterCount) + 1;
        const roundNames = { 1: 'Initial Positions', 2: 'Rebuttals', 3: 'Final Arguments' };
        text = `Round ${roundNum}: ${roundNames[roundNum] || 'Deliberating'}`;
        cls = 'deliberating';
      }
    }

    banner.textContent = text;
    banner.className = 'round-banner visible ' + cls;
  }

  // ── Debate feed ───────────────────────────────────────────────────────────
  function renderDebateFeed(session) {
    const feed = document.getElementById('debateFeed');
    if (!feed) return;
    const rounds = session.rounds || [];
    if (rounds.length === 0) {
      feed.innerHTML = '<div class="feed-loading"><div class="dot-pulse-inline"><span></span><span></span><span></span></div> Waiting for first response…</div>';
      feed.classList.add('visible');
      return;
    }

    feed.classList.add('visible');
    // Remove streaming placeholder before full re-render; it will be re-injected by SSE
    feed.innerHTML = '';
    streamingPlaceholderIdentity = null;
    streamingPlaceholderText = '';

    // Build a map of persona info by identity id
    const personaMap = {};
    seats.forEach(p => { if (p) personaMap[p.id] = p; });

    // Separate debaters from hiring-manager (synthesis)
    const debaterCount = seats.filter(Boolean).length || 3;
    const debateEntries = rounds.filter(r => r.identity !== 'hiring-manager');
    const synthesisEntries = rounds.filter(r => r.identity === 'hiring-manager');

    // Group debate entries into rounds by debaterCount
    let lastRoundNum = 0;
    debateEntries.forEach((entry, idx) => {
      const roundNum = Math.floor(idx / debaterCount) + 1;
      if (roundNum !== lastRoundNum) {
        const sep = document.createElement('div');
        sep.className = 'feed-round-sep';
        const roundNames = { 1: 'Round 1 — Initial Positions', 2: 'Round 2 — Rebuttals', 3: 'Round 3 — Final Arguments' };
        sep.textContent = roundNames[roundNum] || ('Round ' + roundNum);
        feed.appendChild(sep);
        lastRoundNum = roundNum;
      }
      feed.appendChild(buildFeedEntry(entry, 'R' + roundNum, personaMap));
    });

    // Synthesis entries
    if (synthesisEntries.length > 0) {
      const sep = document.createElement('div');
      sep.className = 'feed-round-sep';
      sep.textContent = 'Synthesis';
      feed.appendChild(sep);
      synthesisEntries.forEach(entry => {
        feed.appendChild(buildFeedEntry(entry, 'synthesis', personaMap));
      });
    }
  }

  function buildFeedEntry(entry, roundTag, personaMap) {
    const p = personaMap[entry.identity];
    const isSynthesis = entry.identity === 'hiring-manager';
    const div = document.createElement('div');
    div.className = 'feed-entry' + (isSynthesis ? ' synthesis-entry' : '');

    const headerColor = p && p.color ? p.color : (isSynthesis ? 'var(--teal)' : 'var(--text-muted)');
    // Set persona color as left border accent via CSS variable
    if (p && p.color) {
      div.style.setProperty('--fe-color', p.color);
    } else if (isSynthesis) {
      div.style.setProperty('--fe-color', 'var(--teal)');
    }

    const header = document.createElement('div');
    header.className = 'feed-entry-header';

    if (p && p.avatar_url) {
      const img = document.createElement('img');
      img.className = 'feed-entry-avatar';
      img.src = p.avatar_url;
      img.alt = p.display_name || p.name;
      header.appendChild(img);
    } else {
      const emoji = document.createElement('div');
      emoji.className = 'feed-entry-emoji';
      emoji.textContent = p ? (p.emoji || '🤖') : (isSynthesis ? '⚖️' : '🤖');
      header.appendChild(emoji);
    }

    const nameEl = document.createElement('div');
    nameEl.className = 'feed-entry-name';
    nameEl.style.color = headerColor;
    nameEl.textContent = p ? (p.display_name || p.name) : (isSynthesis ? 'Ibrahim the Immovable' : entry.identity);
    if (p && p.title) {
      const titleBadge = document.createElement('span');
      titleBadge.style.cssText = 'font-size:0.5rem;color:var(--text-muted);margin-left:4px;text-transform:uppercase;letter-spacing:0.05em;';
      titleBadge.textContent = p.title;
      nameEl.appendChild(titleBadge);
    }
    header.appendChild(nameEl);

    // Model badge in feed header
    const modelLabel = p ? (p.model ? p.model.charAt(0).toUpperCase() + p.model.slice(1) : 'Claude') : (isSynthesis ? 'Claude' : '');
    if (modelLabel) {
      const modelBadge = document.createElement('div');
      modelBadge.className = 'feed-entry-model-badge';
      modelBadge.textContent = modelLabel;
      header.appendChild(modelBadge);
    }

    const tag = document.createElement('div');
    tag.className = 'feed-entry-round-tag' + (isSynthesis ? ' synthesis' : '');
    tag.textContent = isSynthesis ? 'synthesis' : roundTag;
    header.appendChild(tag);

    div.appendChild(header);

    const body = document.createElement('div');
    body.className = 'feed-entry-body';
    body.innerHTML = renderMarkdown(entry.response);
    div.appendChild(body);

    return div;
  }

  // ── Verdict card ──────────────────────────────────────────────────────────
  function renderVerdictCard(session) {
    const card = document.getElementById('verdictCard');
    if (!card) return;
    const textEl = document.getElementById('verdictCardText');
    const evoEl = document.getElementById('verdictEvolution');
    const linkEl = document.getElementById('verdictSessionLink');

    textEl.innerHTML = renderMarkdown(session.verdict);
    card.classList.add('visible');

    // Evolution results
    if (session.evolution && typeof session.evolution === 'object') {
      const items = Object.entries(session.evolution);
      if (items.length > 0) {
        evoEl.style.display = '';
        evoEl.innerHTML = '';
        const label = document.createElement('div');
        label.className = 'verdict-evolution-label';
        label.textContent = 'Persona evolution';
        evoEl.appendChild(label);
        items.forEach(([name, info]) => {
          const item = document.createElement('div');
          item.className = 'verdict-evolution-item';
          const verdict = (info && info.verdict) || info || 'RETAIN';
          const badge = document.createElement('span');
          badge.className = 'evo-badge ' + verdict;
          badge.textContent = verdict;
          item.appendChild(badge);
          const nameSpan = document.createElement('span');
          nameSpan.textContent = name + (info && info.reason ? ' — ' + info.reason : '');
          item.appendChild(nameSpan);
          evoEl.appendChild(item);
        });
      }
    }

    // Session link
    if (currentSessionId) {
      const m = currentSessionId.match(/^congress-(\d+)$/);
      if (m) {
        linkEl.innerHTML = 'Session <a href="/congress?session=' + currentSessionId + '">#' + parseInt(m[1]) + '</a>';
      }
    }
  }

  // ── Topic modal ─────────────────────────────────────────────────────────────
  let fullTopicText = '';

  function openTopicModal() {
    if (!fullTopicText) return;
    document.getElementById('topicModalText').textContent = fullTopicText;
    document.getElementById('topicModal').classList.add('open');
  }

  function closeTopicModal() {
    document.getElementById('topicModal').classList.remove('open');
  }

  document.getElementById('topicModalClose').addEventListener('click', closeTopicModal);
  document.getElementById('topicModal').addEventListener('click', function (e) {
    if (e.target === this) closeTopicModal();
  });

  // Re-render circle when window resizes (positions are layout-dependent)
  window.addEventListener('resize', () => renderCircle());

  init();
})();
</script>
</body>
</html>
